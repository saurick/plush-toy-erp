<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>打印窗口加载中</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f5f7fa;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #475569;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="print-window-shell-status">正在准备打印模板...</div>
    <script>
      ;(() => {
        const STORAGE_KEY_PREFIX = '__plush_erp_print_window_state__:'
        const STATE_VERSION = 1
        const STATE_DB_NAME = '__plush_erp_print_window_state_db__'
        const STATE_DB_VERSION = 1
        const STATE_DB_STORE_NAME = 'states'
        const STATE_TTL_MS = 24 * 60 * 60 * 1000
        const RESTORE_FUNCTION_NAME = 'restorePlushErpPrintWindowShell'
        const searchParams = new URLSearchParams(window.location.search)
        const stateID = String(searchParams.get('state') || '').trim()
        let databasePromise = null

        const setStatus = (text) => {
          const status = document.getElementById('print-window-shell-status')
          if (status) {
            status.textContent = text
          }
        }

        const normalizePayload = (payload) => {
          const updatedAt = Number(payload?.updatedAt)
          if (Number(payload?.version) !== STATE_VERSION) {
            return null
          }
          if (
            Number.isFinite(updatedAt) &&
            updatedAt > 0 &&
            Date.now() - updatedAt > STATE_TTL_MS
          ) {
            return null
          }
          return payload
        }

        const readPersistedStateFromStorage = () => {
          if (!stateID) {
            return null
          }
          try {
            const raw = window.localStorage.getItem(
              `${STORAGE_KEY_PREFIX}${stateID}`
            )
            if (!raw) {
              return null
            }
            const payload = normalizePayload(JSON.parse(raw))
            if (!payload) {
              window.localStorage.removeItem(`${STORAGE_KEY_PREFIX}${stateID}`)
              return null
            }
            return payload
          } catch (error) {
            return null
          }
        }

        const openDatabase = () => {
          if (databasePromise) {
            return databasePromise
          }
          if (
            !window.indexedDB ||
            typeof window.indexedDB.open !== 'function'
          ) {
            return Promise.resolve(null)
          }

          databasePromise = new Promise((resolve) => {
            try {
              const request = window.indexedDB.open(
                STATE_DB_NAME,
                STATE_DB_VERSION
              )
              request.onupgradeneeded = () => {
                const database = request.result
                if (!database.objectStoreNames.contains(STATE_DB_STORE_NAME)) {
                  database.createObjectStore(STATE_DB_STORE_NAME, {
                    keyPath: 'stateID',
                  })
                }
              }
              request.onsuccess = () => resolve(request.result)
              request.onerror = () => resolve(null)
              request.onblocked = () => resolve(null)
            } catch (error) {
              resolve(null)
            }
          })

          return databasePromise
        }

        const readPersistedStateFromIndexedDB = async () => {
          if (!stateID) {
            return null
          }
          const database = await openDatabase()
          if (!database) {
            return null
          }

          return new Promise((resolve) => {
            try {
              const transaction = database.transaction(
                STATE_DB_STORE_NAME,
                'readonly'
              )
              const request = transaction
                .objectStore(STATE_DB_STORE_NAME)
                .get(stateID)
              request.onsuccess = () =>
                resolve(normalizePayload(request.result))
              request.onerror = () => resolve(null)
              transaction.onabort = () => resolve(null)
            } catch (error) {
              resolve(null)
            }
          })
        }

        const readPersistedState = async () => {
          const storagePayload = readPersistedStateFromStorage()
          if (storagePayload) {
            return storagePayload
          }
          return readPersistedStateFromIndexedDB()
        }

        const syncClonedFormState = (sourceDocument, clonedRoot) => {
          const sourceFields = Array.from(
            sourceDocument.querySelectorAll('input, textarea, select')
          )
          const clonedFields = Array.from(
            clonedRoot.querySelectorAll('input, textarea, select')
          )

          sourceFields.forEach((sourceField, index) => {
            const clonedField = clonedFields[index]
            if (!clonedField) {
              return
            }

            const tagName = String(sourceField.tagName || '').toLowerCase()
            if (tagName === 'textarea') {
              clonedField.textContent = sourceField.value
              return
            }

            if (tagName === 'select') {
              Array.from(clonedField.options || []).forEach(
                (option, optionIndex) => {
                  const sourceOption = sourceField.options?.[optionIndex]
                  const isSelected = Boolean(sourceOption?.selected)
                  option.selected = isSelected
                  if (isSelected) {
                    option.setAttribute('selected', 'selected')
                  } else {
                    option.removeAttribute('selected')
                  }
                }
              )
              return
            }

            const inputType = String(sourceField.type || '').toLowerCase()
            if (inputType === 'checkbox' || inputType === 'radio') {
              clonedField.checked = sourceField.checked
              if (sourceField.checked) {
                clonedField.setAttribute('checked', 'checked')
              } else {
                clonedField.removeAttribute('checked')
              }
              return
            }

            clonedField.value = sourceField.value
            clonedField.setAttribute('value', sourceField.value)
          })
        }

        const buildCurrentWindowHTML = () => {
          if (!document.documentElement) {
            return ''
          }
          const clonedRoot = document.documentElement.cloneNode(true)
          clonedRoot
            .querySelectorAll('script')
            .forEach((script) => script.remove())
          syncClonedFormState(document, clonedRoot)
          return `<!doctype html>${clonedRoot.outerHTML}`
        }

        const persistStateRecordToIndexedDB = async (record) => {
          const database = await openDatabase()
          if (!database) {
            return false
          }

          return new Promise((resolve) => {
            try {
              const transaction = database.transaction(
                STATE_DB_STORE_NAME,
                'readwrite'
              )
              const request = transaction
                .objectStore(STATE_DB_STORE_NAME)
                .put(record)
              let settled = false
              const finalize = (saved) => {
                if (settled) {
                  return
                }
                settled = true
                resolve(saved)
              }
              request.onsuccess = () => finalize(true)
              request.onerror = () => finalize(false)
              transaction.oncomplete = () => finalize(true)
              transaction.onerror = () => finalize(false)
              transaction.onabort = () => finalize(false)
            } catch (error) {
              resolve(false)
            }
          })
        }

        const persistRestoredWindowSnapshot = (payload, windowHTMLOverride) => {
          if (!stateID) {
            return false
          }
          const windowHTML = windowHTMLOverride || buildCurrentWindowHTML()
          if (!windowHTML) {
            return false
          }

          const record = {
            ...payload,
            version: STATE_VERSION,
            stateID,
            updatedAt: Date.now(),
            windowHTML,
          }
          try {
            window.localStorage.setItem(
              `${STORAGE_KEY_PREFIX}${stateID}`,
              JSON.stringify(record)
            )
            persistStateRecordToIndexedDB(record).catch(() => {})
            return true
          } catch (error) {
            persistStateRecordToIndexedDB(record).catch(() => {})
            return false
          }
        }

        const installRestoredWindowSnapshotPersistence = (payload) => {
          if (!stateID) {
            return
          }

          let persistTimer = 0
          let persistIdle = 0
          let pendingWindowHTML = ''
          let lastPersistedWindowHTML = ''
          const clearPersistHandles = () => {
            if (persistTimer) {
              window.clearTimeout(persistTimer)
              persistTimer = 0
            }
            if (
              persistIdle &&
              typeof window.cancelIdleCallback === 'function'
            ) {
              window.cancelIdleCallback(persistIdle)
              persistIdle = 0
            }
          }
          const persistNow = () => {
            clearPersistHandles()
            const windowHTML =
              pendingWindowHTML ||
              lastPersistedWindowHTML ||
              buildCurrentWindowHTML()
            if (!windowHTML) {
              return
            }
            pendingWindowHTML = ''
            lastPersistedWindowHTML = windowHTML
            persistRestoredWindowSnapshot(payload, windowHTML)
          }
          const capturePendingWindowHTML = () => {
            const windowHTML = buildCurrentWindowHTML()
            if (windowHTML) {
              pendingWindowHTML = windowHTML
            }
          }
          const schedulePersist = () => {
            capturePendingWindowHTML()
            clearPersistHandles()
            persistTimer = window.setTimeout(() => {
              persistTimer = 0
              if (typeof window.requestIdleCallback === 'function') {
                persistIdle = window.requestIdleCallback(persistNow, {
                  timeout: 1000,
                })
                return
              }
              persistNow()
            }, 0)
          }

          if (typeof window.MutationObserver === 'function') {
            const observer = new window.MutationObserver(schedulePersist)
            observer.observe(document.documentElement, {
              subtree: true,
              childList: true,
              characterData: true,
            })
          }

          document.addEventListener('input', schedulePersist, true)
          document.addEventListener('change', schedulePersist, true)
          persistNow()
        }

        window[RESTORE_FUNCTION_NAME] = async () => {
          const payload = await readPersistedState()
          const windowHTML = String(payload?.windowHTML || '').trim()
          if (windowHTML) {
            document.open()
            document.write(windowHTML)
            document.close()
            installRestoredWindowSnapshotPersistence(payload)
            return
          }
          const workspaceURL = String(payload?.workspaceURL || '').trim()
          if (!workspaceURL) {
            setStatus('打印窗口不存在或已过期，请返回打印中心重新打开。')
            return
          }
          window.location.replace(workspaceURL)
        }

        window[RESTORE_FUNCTION_NAME]()
      })()
    </script>
  </body>
</html>
