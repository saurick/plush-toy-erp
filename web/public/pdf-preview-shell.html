<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF 预览加载中</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #f5f7fa;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #475569;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div id="pdf-preview-shell-status">正在加载 PDF 预览...</div>
    <script>
      ;(() => {
        const STORAGE_KEY_PREFIX = '__plush_erp_pdf_preview_state__'
        const STATE_DB_NAME = '__plush_erp_pdf_preview_state_db__'
        const STATE_DB_VERSION = 1
        const STATE_DB_STORE_NAME = 'states'
        const STATE_VERSION = 1
        const RESTORE_FUNCTION_NAME = 'restorePlushErpPdfPreviewShell'
        const DEFAULT_WAIT_TIMEOUT_MS = 50000
        const POLL_INTERVAL_MS = 80
        const searchParams = new URLSearchParams(window.location.search)
        const stateID = String(searchParams.get('state') || '').trim()
        const storageKey = stateID ? `${STORAGE_KEY_PREFIX}${stateID}` : ''
        let restoreSettled = false
        let restoreInFlight = false
        let waitTimer = 0
        let pollTimer = 0
        let stateDatabasePromise = null

        const setStatus = (text) => {
          const status = document.getElementById('pdf-preview-shell-status')
          if (status) {
            status.textContent = text
          }
        }

        const readPersistedHTMLFromPayload = (payload) => {
          if (!payload || typeof payload !== 'object') {
            return ''
          }
          if (
            payload.version != null &&
            Number(payload.version) !== STATE_VERSION
          ) {
            return ''
          }
          return typeof payload.html === 'string' ? payload.html.trim() : ''
        }

        const openStateDatabase = () => {
          if (stateDatabasePromise) {
            return stateDatabasePromise
          }
          if (
            !window.indexedDB ||
            typeof window.indexedDB.open !== 'function'
          ) {
            return Promise.resolve(null)
          }

          stateDatabasePromise = new Promise((resolve) => {
            try {
              const request = window.indexedDB.open(
                STATE_DB_NAME,
                STATE_DB_VERSION
              )
              request.onupgradeneeded = () => {
                const database = request.result
                if (!database.objectStoreNames.contains(STATE_DB_STORE_NAME)) {
                  database.createObjectStore(STATE_DB_STORE_NAME, {
                    keyPath: 'stateID',
                  })
                }
              }
              request.onsuccess = () => {
                const database = request.result
                database.onversionchange = () => {
                  try {
                    database.close()
                  } catch (error) {}
                }
                resolve(database)
              }
              request.onerror = () => resolve(null)
              request.onblocked = () => resolve(null)
            } catch (error) {
              resolve(null)
            }
          })
          return stateDatabasePromise
        }

        const readPersistedHTMLFromIndexedDB = async () => {
          if (!stateID) {
            return ''
          }
          const database = await openStateDatabase()
          if (!database) {
            return ''
          }

          return new Promise((resolve) => {
            try {
              const transaction = database.transaction(
                STATE_DB_STORE_NAME,
                'readonly'
              )
              const request = transaction
                .objectStore(STATE_DB_STORE_NAME)
                .get(stateID)
              let settled = false
              const finalize = (html) => {
                if (settled) {
                  return
                }
                settled = true
                resolve(html)
              }
              request.onsuccess = () =>
                finalize(readPersistedHTMLFromPayload(request.result))
              request.onerror = () => finalize('')
              transaction.onerror = () => finalize('')
              transaction.onabort = () => finalize('')
            } catch (error) {
              resolve('')
            }
          })
        }

        const readPersistedHTMLFromStorage = () => {
          if (!storageKey) {
            return ''
          }
          try {
            const raw = window.localStorage.getItem(storageKey)
            if (!raw) {
              return ''
            }
            return readPersistedHTMLFromPayload(JSON.parse(raw))
          } catch (error) {
            return ''
          }
        }

        const readPersistedHTML = async () => {
          const indexedDBHTML = await readPersistedHTMLFromIndexedDB()
          if (indexedDBHTML) {
            return indexedDBHTML
          }
          return readPersistedHTMLFromStorage()
        }

        const cleanupWaiters = () => {
          if (pollTimer) {
            window.clearInterval(pollTimer)
            pollTimer = 0
          }
          if (waitTimer) {
            window.clearTimeout(waitTimer)
            waitTimer = 0
          }
          window.removeEventListener('storage', handleStorage)
        }

        const restoreNow = async () => {
          if (restoreSettled || restoreInFlight) {
            return false
          }
          restoreInFlight = true
          const html = await readPersistedHTML()
          if (!html) {
            restoreInFlight = false
            return false
          }
          restoreSettled = true
          cleanupWaiters()
          document.open()
          document.write(html)
          document.close()
          return true
        }

        const handleStorage = (event) => {
          if (restoreSettled) {
            return
          }
          if (event && event.key && event.key !== storageKey) {
            return
          }
          void restoreNow()
        }

        window[RESTORE_FUNCTION_NAME] = () => {
          void restoreNow()
        }

        if (!storageKey) {
          setStatus('PDF 预览链接缺少状态参数，请返回工作台重新打开。')
          return
        }

        setStatus('正在等待 PDF 预览结果...')
        window.addEventListener('storage', handleStorage)
        pollTimer = window.setInterval(() => {
          void restoreNow()
        }, POLL_INTERVAL_MS)
        waitTimer = window.setTimeout(() => {
          if (restoreSettled) {
            return
          }
          cleanupWaiters()
          setStatus('PDF 预览不存在或已过期，请返回工作台重新打开。')
        }, DEFAULT_WAIT_TIMEOUT_MS)
        void restoreNow()
      })()
    </script>
  </body>
</html>
