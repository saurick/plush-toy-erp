<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>岗位任务中心 v2 · Current</title>
    <style>
      :root {
        font-family:
          Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color-scheme: light;
        --viewport-height: 100dvh;
        --page: #eef2f7;
        --surface: #ffffff;
        --surface-muted: #f6f8fb;
        --surface-raised: #ffffff;
        --line: #dde3eb;
        --line-strong: #c9d2df;
        --text: #162033;
        --text-secondary: #5e6b80;
        --text-muted: #8792a5;
        --brand: #2563eb;
        --brand-strong: #1d4ed8;
        --brand-soft: #eaf1ff;
        --success: #0f8a62;
        --success-soft: #e9f8f2;
        --warning: #b65d0d;
        --warning-soft: #fff4e5;
        --danger: #c53b45;
        --danger-soft: #fff0f1;
        --purple: #7657d7;
        --purple-soft: #f0edff;
        --shadow:
          0 24px 72px rgba(15, 23, 42, 0.18),
          0 2px 8px rgba(15, 23, 42, 0.08);
        --footer-shadow: 0 -10px 26px rgba(15, 23, 42, 0.08);
      }

      [data-theme="dark"] {
        color-scheme: dark;
        --page: #080d16;
        --surface: #111827;
        --surface-muted: #171f2d;
        --surface-raised: #172132;
        --line: #2a3546;
        --line-strong: #3a475b;
        --text: #edf2f9;
        --text-secondary: #bac4d2;
        --text-muted: #8995a8;
        --brand: #75a5ff;
        --brand-strong: #9abbff;
        --brand-soft: #172a4d;
        --success: #54d6aa;
        --success-soft: #14352f;
        --warning: #ffb45f;
        --warning-soft: #3c2916;
        --danger: #ff8791;
        --danger-soft: #421f25;
        --purple: #b9a6ff;
        --purple-soft: #2d2748;
        --shadow:
          0 28px 78px rgba(0, 0, 0, 0.56),
          0 2px 10px rgba(0, 0, 0, 0.4);
        --footer-shadow: 0 -10px 26px rgba(0, 0, 0, 0.34);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: var(--page);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        color: inherit;
      }

      button:not(:disabled) {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      button,
      textarea {
        -webkit-tap-highlight-color: transparent;
      }

      :focus-visible {
        outline: 3px solid color-mix(in srgb, var(--brand) 62%, transparent);
        outline-offset: 3px;
      }

      .prototype-shell {
        display: grid;
        width: 100%;
        height: var(--viewport-height);
        background: var(--page);
        color: var(--text);
        place-items: center;
      }

      .phone-frame {
        position: relative;
        width: min(100%, 430px);
        height: var(--viewport-height);
        overflow: hidden;
        background: var(--surface-muted);
      }

      .screen {
        display: flex;
        min-height: 0;
        height: 100%;
        flex-direction: column;
        background: var(--surface-muted);
      }

      .screen-header {
        position: relative;
        z-index: 4;
        flex: none;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface) 94%, transparent);
        backdrop-filter: blur(16px);
      }

      .list-header {
        padding:
          max(16px, env(safe-area-inset-top))
          18px
          15px;
      }

      .header-row,
      .detail-title-row,
      .section-heading,
      .task-card__top,
      .receipt-row,
      .form-label-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 25px;
        line-height: 1.25;
        letter-spacing: -0.02em;
      }

      h2 {
        font-size: 18px;
        line-height: 1.35;
      }

      h3 {
        font-size: 16px;
        line-height: 1.4;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-button {
        display: inline-grid;
        width: 44px;
        height: 44px;
        flex: none;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 13px;
        background: var(--surface);
        color: var(--text-secondary);
      }

      .icon-button:hover {
        border-color: var(--line-strong);
        background: var(--surface-raised);
        color: var(--text);
      }

      .icon {
        display: block;
        width: 20px;
        height: 20px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.9;
      }

      .task-access .icon {
        display: inline-block;
        width: 15px;
        height: 15px;
        vertical-align: -3px;
      }

      .role-line {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 8px;
        margin-top: 12px;
        color: var(--text-secondary);
        font-size: 13px;
      }

      .role-pill,
      .badge,
      .task-status,
      .receipt-status {
        display: inline-flex;
        min-width: 0;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-weight: 700;
        white-space: nowrap;
      }

      .role-pill {
        padding: 6px 10px;
        background: var(--brand-soft);
        color: var(--brand);
      }

      .sync-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .screen-main {
        min-height: 0;
        flex: 1;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
        scrollbar-gutter: stable;
        -webkit-overflow-scrolling: touch;
      }

      .list-main {
        padding: 16px 14px calc(24px + env(safe-area-inset-bottom));
      }

      .focus-strip {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 54px;
        margin-bottom: 14px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        color: var(--text-secondary);
        font-size: 13px;
      }

      .focus-strip strong {
        color: var(--text);
        font-size: 15px;
      }

      .focus-strip__icon {
        display: grid;
        width: 32px;
        height: 32px;
        flex: none;
        place-items: center;
        border-radius: 10px;
        background: var(--warning-soft);
        color: var(--warning);
      }

      .filter-scroller {
        display: flex;
        gap: 8px;
        margin: 0 -14px 15px;
        padding: 0 14px 3px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .filter-scroller::-webkit-scrollbar {
        display: none;
      }

      .filter-button {
        min-height: 38px;
        flex: none;
        padding: 8px 13px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 700;
      }

      .filter-button[aria-pressed="true"] {
        border-color: var(--brand);
        background: var(--brand-soft);
        color: var(--brand);
      }

      .task-list {
        display: grid;
        gap: 10px;
      }

      .task-card {
        width: 100%;
        min-width: 0;
        padding: 15px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
        color: var(--text);
        text-align: left;
        box-shadow: 0 1px 1px rgba(15, 23, 42, 0.025);
      }

      .task-card:hover {
        border-color: color-mix(in srgb, var(--brand) 42%, var(--line));
        background: var(--surface-raised);
      }

      .task-card__top {
        align-items: flex-start;
      }

      .badge {
        max-width: 100%;
        padding: 5px 9px;
        border: 1px solid var(--line);
        background: var(--surface-muted);
        color: var(--text-secondary);
        font-size: 12px;
      }

      .badge--danger {
        border-color: color-mix(in srgb, var(--danger) 32%, var(--line));
        background: var(--danger-soft);
        color: var(--danger);
      }

      .badge--warning {
        border-color: color-mix(in srgb, var(--warning) 34%, var(--line));
        background: var(--warning-soft);
        color: var(--warning);
      }

      .badge--success {
        border-color: color-mix(in srgb, var(--success) 34%, var(--line));
        background: var(--success-soft);
        color: var(--success);
      }

      .badge--purple {
        border-color: color-mix(in srgb, var(--purple) 34%, var(--line));
        background: var(--purple-soft);
        color: var(--purple);
      }

      .task-access {
        flex: none;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 700;
      }

      .task-card__title {
        margin-top: 12px;
        overflow-wrap: anywhere;
        font-size: 17px;
        font-weight: 760;
        line-height: 1.42;
      }

      .task-card__source,
      .task-card__summary,
      .task-card__footer,
      .helper,
      .section-note,
      .receipt-note {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.55;
      }

      .task-card__source {
        margin-top: 6px;
        overflow-wrap: anywhere;
      }

      .task-card__summary {
        margin-top: 10px;
        padding-top: 10px;
        overflow-wrap: anywhere;
        border-top: 1px solid var(--line);
      }

      .task-card__footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
      }

      .task-card__footer span:first-child {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .due--danger {
        color: var(--danger);
        font-weight: 750;
      }

      .due--warning {
        color: var(--warning);
        font-weight: 750;
      }

      .empty-list {
        padding: 48px 24px;
        border: 1px dashed var(--line-strong);
        border-radius: 18px;
        background: var(--surface);
        color: var(--text-secondary);
        text-align: center;
      }

      .topbar {
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) 48px;
        align-items: center;
        min-height: 68px;
        padding:
          max(8px, env(safe-area-inset-top))
          10px
          8px;
      }

      .topbar__title {
        min-width: 0;
        overflow: hidden;
        font-size: 17px;
        font-weight: 760;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .topbar .icon-button {
        width: 44px;
        height: 44px;
        border-color: transparent;
        background: transparent;
      }

      .workflow-steps {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0;
        padding: 0 10px 10px;
      }

      .step-button {
        position: relative;
        display: grid;
        min-width: 0;
        min-height: 58px;
        grid-template-columns: 24px minmax(0, 1fr);
        align-items: center;
        gap: 6px;
        padding: 7px 5px;
        border: 0;
        border-radius: 12px;
        background: transparent;
        color: var(--text-muted);
        text-align: left;
      }

      .step-button::after {
        position: absolute;
        top: 29px;
        right: -8px;
        width: 16px;
        height: 1px;
        background: var(--line-strong);
        content: "";
      }

      .step-button:last-child::after {
        display: none;
      }

      .step-number {
        display: grid;
        width: 24px;
        height: 24px;
        place-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 50%;
        background: var(--surface);
        font-size: 12px;
        font-weight: 800;
      }

      .step-copy {
        min-width: 0;
      }

      .step-copy strong,
      .step-copy small {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .step-copy strong {
        font-size: 12px;
      }

      .step-copy small {
        margin-top: 2px;
        font-size: 10px;
        font-weight: 650;
      }

      .step-button:hover {
        background: var(--surface-muted);
        color: var(--text-secondary);
      }

      .step-button[aria-current="step"] {
        background: var(--brand-soft);
        color: var(--brand);
      }

      .step-button[aria-current="step"] .step-number {
        border-color: var(--brand);
        background: var(--brand);
        color: #ffffff;
      }

      .step-button:disabled {
        background: transparent;
        color: var(--text-muted);
        opacity: 0.52;
      }

      .detail-main,
      .process-main,
      .result-main {
        padding: 15px 14px 24px;
      }

      .hero-card,
      .action-card,
      .content-card,
      .notice-card,
      .receipt-card {
        min-width: 0;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
      }

      .hero-card,
      .action-card,
      .content-card,
      .receipt-card {
        padding: 16px;
      }

      .hero-card__title {
        margin-top: 13px;
        overflow-wrap: anywhere;
        font-size: 22px;
        font-weight: 780;
        line-height: 1.38;
        letter-spacing: -0.015em;
      }

      .hero-card__description {
        margin-top: 10px;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.65;
        overflow-wrap: anywhere;
      }

      .status-row {
        display: flex;
        min-width: 0;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .task-status {
        padding: 5px 9px;
        background: var(--brand-soft);
        color: var(--brand);
        font-size: 12px;
      }

      .fact-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1px;
        margin-top: 16px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--line);
      }

      .fact {
        min-width: 0;
        min-height: 78px;
        padding: 12px;
        background: var(--surface);
      }

      .fact__label {
        color: var(--text-muted);
        font-size: 12px;
      }

      .fact__value {
        margin-top: 6px;
        overflow-wrap: anywhere;
        font-size: 14px;
        font-weight: 720;
        line-height: 1.45;
      }

      .notice-card {
        display: flex;
        align-items: flex-start;
        gap: 11px;
        margin-top: 12px;
        padding: 13px 14px;
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.55;
      }

      .notice-card--warning {
        border-color: color-mix(in srgb, var(--warning) 35%, var(--line));
        background: var(--warning-soft);
        color: var(--warning);
      }

      .notice-card--danger {
        border-color: color-mix(in srgb, var(--danger) 35%, var(--line));
        background: var(--danger-soft);
        color: var(--danger);
      }

      .notice-card--brand {
        border-color: color-mix(in srgb, var(--brand) 34%, var(--line));
        background: var(--brand-soft);
        color: var(--brand);
      }

      .notice-card .icon {
        width: 18px;
        height: 18px;
        flex: none;
        margin-top: 1px;
      }

      .content-card {
        margin-top: 12px;
      }

      .section-heading {
        align-items: flex-start;
      }

      .section-heading__label {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 700;
      }

      .source-line,
      .activity-line {
        margin-top: 13px;
        overflow-wrap: anywhere;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.58;
      }

      .source-line strong,
      .activity-line strong {
        color: var(--text);
      }

      .screen-footer {
        position: relative;
        z-index: 5;
        display: grid;
        flex: none;
        gap: 9px;
        padding: 12px 14px calc(12px + env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface) 96%, transparent);
        box-shadow: var(--footer-shadow);
        backdrop-filter: blur(16px);
      }

      .screen-footer--two {
        grid-template-columns: minmax(0, 0.8fr) minmax(0, 1.2fr);
      }

      .button {
        display: inline-flex;
        min-width: 0;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 11px 15px;
        border: 1px solid transparent;
        border-radius: 14px;
        font-size: 15px;
        font-weight: 760;
        line-height: 1.25;
        text-align: center;
      }

      .button--primary {
        border-color: var(--brand);
        background: var(--brand);
        color: #ffffff;
      }

      .button--primary:hover {
        border-color: var(--brand-strong);
        background: var(--brand-strong);
      }

      .button--secondary {
        border-color: var(--line);
        background: var(--surface);
        color: var(--text-secondary);
      }

      .button--secondary:hover {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .button--full {
        width: 100%;
        margin-top: 12px;
      }

      .button:disabled {
        opacity: 0.55;
      }

      .action-card__heading {
        min-width: 0;
      }

      .action-card__heading p {
        margin-top: 5px;
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.55;
        overflow-wrap: anywhere;
      }

      .action-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .action-choice {
        position: relative;
        display: block;
        min-width: 0;
        min-height: 108px;
        padding: 13px 42px 13px 13px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        text-align: left;
      }

      .action-choice:hover {
        border-color: var(--line-strong);
      }

      .action-choice[data-selected="true"] {
        border-color: var(--brand);
        box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand) 16%, transparent);
      }

      .action-choice:focus-within {
        outline: 3px solid color-mix(in srgb, var(--brand) 24%, transparent);
        outline-offset: 2px;
      }

      .action-choice__radio {
        position: absolute;
        top: 15px;
        right: 15px;
        width: 18px;
        height: 18px;
        margin: 0;
        accent-color: var(--brand);
      }

      .action-choice__icon {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border-radius: 11px;
        background: var(--brand-soft);
        color: var(--brand);
      }

      .action-choice[data-tone="success"] .action-choice__icon {
        background: var(--success-soft);
        color: var(--success);
      }

      .action-choice[data-tone="warning"] .action-choice__icon {
        background: var(--warning-soft);
        color: var(--warning);
      }

      .action-choice[data-tone="danger"] .action-choice__icon {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .action-choice[data-tone="purple"] .action-choice__icon {
        background: var(--purple-soft);
        color: var(--purple);
      }

      .action-choice strong,
      .action-choice span {
        display: block;
      }

      .action-choice .action-choice__icon {
        display: grid;
      }

      .action-choice strong {
        margin-top: 10px;
        font-size: 15px;
      }

      .action-choice span {
        margin-top: 4px;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.45;
      }

      .single-action-summary {
        display: flex;
        min-width: 0;
        align-items: flex-start;
        gap: 12px;
        margin-top: 14px;
        padding: 13px;
        border: 1px solid color-mix(in srgb, var(--purple) 28%, var(--line));
        border-radius: 16px;
        background: color-mix(in srgb, var(--purple-soft) 74%, var(--surface));
      }

      .single-action-summary__icon {
        display: grid;
        width: 36px;
        height: 36px;
        flex: none;
        place-items: center;
        border-radius: 11px;
        background: var(--purple-soft);
        color: var(--purple);
      }

      .single-action-summary__copy {
        min-width: 0;
      }

      .single-action-summary__copy strong,
      .single-action-summary__copy span {
        display: block;
      }

      .single-action-summary__copy strong {
        font-size: 15px;
        line-height: 1.4;
      }

      .single-action-summary__copy span {
        margin-top: 3px;
        color: var(--text-secondary);
        font-size: 12px;
        line-height: 1.5;
        overflow-wrap: anywhere;
      }

      .form-card {
        margin-top: 12px;
        padding: 15px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--surface);
      }

      .form-field + .form-field {
        margin-top: 16px;
      }

      .form-label {
        color: var(--text);
        font-size: 14px;
        font-weight: 760;
      }

      .required {
        color: var(--danger);
      }

      .optional {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 650;
      }

      textarea {
        display: block;
        width: 100%;
        min-height: 112px;
        margin-top: 8px;
        padding: 12px 13px;
        resize: vertical;
        border: 1px solid var(--line-strong);
        border-radius: 13px;
        background: var(--surface-muted);
        color: var(--text);
        font-size: 15px;
        line-height: 1.55;
      }

      textarea::placeholder {
        color: var(--text-muted);
      }

      textarea:focus {
        border-color: var(--brand);
        outline: 0;
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 17%, transparent);
      }

      textarea[aria-invalid="true"] {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 14%, transparent);
      }

      .field-meta {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .field-error {
        color: var(--danger);
        font-weight: 700;
      }

      .quick-reasons {
        display: flex;
        gap: 7px;
        margin-top: 10px;
        padding-bottom: 2px;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .quick-reasons::-webkit-scrollbar {
        display: none;
      }

      .quick-reason {
        min-height: 36px;
        flex: none;
        padding: 7px 10px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: var(--surface);
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 700;
      }

      .receipt-mark {
        display: grid;
        width: 62px;
        height: 62px;
        place-items: center;
        border-radius: 20px;
      }

      .receipt-hero {
        display: grid;
        justify-items: center;
        padding: 18px 10px 8px;
        text-align: center;
      }

      .receipt-mark {
        background: var(--success-soft);
        color: var(--success);
      }

      .receipt-mark--warning {
        background: var(--warning-soft);
        color: var(--warning);
      }

      .receipt-hero h1 {
        margin-top: 14px;
        font-size: 22px;
      }

      .receipt-hero p {
        margin-top: 7px;
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.55;
      }

      .receipt-status {
        margin-top: 11px;
        padding: 6px 10px;
        background: var(--success-soft);
        color: var(--success);
        font-size: 12px;
      }

      .receipt-status--warning {
        background: var(--warning-soft);
        color: var(--warning);
      }

      .receipt-card {
        margin-top: 12px;
      }

      .receipt-row {
        align-items: flex-start;
        padding: 11px 0;
        border-bottom: 1px solid var(--line);
        font-size: 13px;
        line-height: 1.55;
      }

      .receipt-row:first-child {
        padding-top: 0;
      }

      .receipt-row:last-child {
        padding-bottom: 0;
        border-bottom: 0;
      }

      .receipt-row__label {
        flex: none;
        color: var(--text-muted);
      }

      .receipt-row__value {
        min-width: 0;
        overflow-wrap: anywhere;
        color: var(--text);
        font-weight: 680;
        text-align: right;
      }

      .receipt-note {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 14px;
        background: var(--surface);
      }

      .toast {
        position: absolute;
        z-index: 20;
        top: max(18px, env(safe-area-inset-top));
        left: 50%;
        max-width: calc(100% - 32px);
        padding: 10px 14px;
        transform: translate(-50%, -18px);
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--text);
        color: var(--surface);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.25);
        font-size: 13px;
        font-weight: 700;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .toast.visible {
        transform: translate(-50%, 0);
        opacity: 1;
      }

      @media (min-width: 720px) {
        .prototype-shell {
          padding: 20px;
        }

        .phone-frame {
          height: min(900px, calc(var(--viewport-height) - 40px));
          border: 1px solid var(--line-strong);
          border-radius: 32px;
          box-shadow: var(--shadow);
        }
      }

      @media (max-width: 390px) {
        .list-header {
          padding-right: 14px;
          padding-left: 14px;
        }

        h1 {
          font-size: 23px;
        }

        .detail-main,
        .process-main,
        .result-main {
          padding-right: 12px;
          padding-left: 12px;
        }

        .step-button {
          grid-template-columns: 22px minmax(0, 1fr);
          gap: 4px;
          padding-right: 3px;
          padding-left: 3px;
        }

        .step-number {
          width: 22px;
          height: 22px;
        }

        .step-copy strong {
          font-size: 11px;
        }

        .step-copy small {
          font-size: 9px;
        }

        .hero-card__title {
          font-size: 20px;
        }

        .screen-footer {
          padding-right: 12px;
          padding-left: 12px;
        }
      }

      @media (max-width: 350px) {
        .step-copy small {
          display: none;
        }

        .action-grid {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="prototype-shell" id="prototype" data-theme="light">
      <main class="phone-frame" id="app" aria-label="岗位任务中心 v2 原型"></main>
      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script>
      const ICON_PATHS = {
        back: '<path d="m15 18-6-6 6-6"></path>',
        moon: '<path d="M21 12.8A8.5 8.5 0 1 1 11.2 3 6.5 6.5 0 0 0 21 12.8Z"></path>',
        sun: '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path>',
        refresh: '<path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5"></path><path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5"></path>',
        alert: '<path d="M10.3 3.6 2.7 17a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 3.6a2 2 0 0 0-3.4 0Z"></path><path d="M12 9v4M12 17h.01"></path>',
        arrow: '<path d="m9 18 6-6-6-6"></path>',
        check: '<path d="m20 6-11 11-5-5"></path>',
        pause: '<rect x="6" y="4" width="4" height="16" rx="1"></rect><rect x="14" y="4" width="4" height="16" rx="1"></rect>',
        reject: '<path d="m15 18-6-6 6-6"></path><path d="M9 12h10"></path>',
        resume: '<path d="M20 11a8 8 0 1 0-2.3 5.7"></path><path d="M20 4v7h-7"></path>',
        bell: '<path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"></path>',
        info: '<circle cx="12" cy="12" r="9"></circle><path d="M12 11v5M12 8h.01"></path>',
        receipt: '<path d="M6 2h12v20l-3-2-3 2-3-2-3 2Z"></path><path d="M9 8h6M9 12h6M9 16h4"></path>',
        clock: '<circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path>',
        spinner: '<path d="M21 12a9 9 0 1 1-6.2-8.6"></path>',
      };

      function icon(name) {
        return '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">' + (ICON_PATHS[name] || '') + '</svg>';
      }

      function escapeHTML(value) {
        return String(value == null ? '' : value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      const ACTIONS = {
        done: {
          label: '完成',
          title: '完成任务',
          description: '提交完成反馈，结束当前任务',
          icon: 'check',
          tone: 'success',
          reasonRequired: true,
          reasonLabel: '完成反馈',
        },
        blocked: {
          label: '阻塞',
          title: '标记阻塞',
          description: '记录卡点，等待责任岗位解除',
          icon: 'pause',
          tone: 'warning',
          reasonRequired: true,
          reasonLabel: '阻塞原因',
        },
        rejected: {
          label: '退回',
          title: '退回任务',
          description: '说明退回依据，交还上一步处理',
          icon: 'reject',
          tone: 'danger',
          reasonRequired: true,
          reasonLabel: '退回原因',
        },
        resume: {
          label: '解除阻塞',
          title: '解除阻塞',
          description: '说明卡点已解决，恢复任务处理',
          icon: 'resume',
          tone: 'brand',
          reasonRequired: true,
          reasonLabel: '解除说明',
        },
        urge: {
          label: '催办',
          title: '发起催办',
          description: '提醒责任岗位处理，不替代其完成任务',
          icon: 'bell',
          tone: 'purple',
          reasonRequired: true,
          reasonLabel: '催办原因',
        },
      };

      const tasks = [
        {
          title: '确认来料存放位置',
          source: '采购入库单 PR-202607-028',
          summary: 'PP棉 · 1kg/包 · 120包',
          description: '来料已到厂，请核对采购入库单与包装标签，确认仓位后提交处理结果。',
          status: '待处理',
          accessLabel: '可处理',
          owner: '仓库',
          severity: 'warning',
          severityLabel: '即将超时',
          due: '今天 18:30',
          views: ['todo'],
          actions: ['done', 'blocked', 'rejected', 'urge'],
          facts: [
            ['负责岗位', '仓库'],
            ['到货数量', '120包'],
            ['建议仓区', '原料 A 区'],
            ['截止时间', '今天 18:30'],
          ],
          guidance: '本岗位可完成、阻塞、退回或催办。选择处理方式后再填写对应信息。',
          latest: '采购已登记到货，等待仓库确认存放位置。',
          receipt: null,
        },
        {
          title: '等待成品质检结论',
          source: '生产订单 MO-202607-036',
          summary: '毛绒兔 30cm · 500只 · 成品抽检',
          description: '成品已送检。仓库可以查看任务进度并催办品质岗位，但不能代替品质提交检验结论。',
          status: '等待品质',
          accessLabel: '仅可催办',
          owner: '品质',
          severity: 'danger',
          severityLabel: '已超时',
          due: '昨天 16:00',
          views: ['todo', 'risk'],
          actions: ['urge'],
          facts: [
            ['负责岗位', '品质'],
            ['送检数量', '500只'],
            ['检验类型', '成品抽检'],
            ['截止时间', '昨天 16:00'],
          ],
          guidance: '当前岗位不负责完成这条任务。第 2 步仅提供“催办”，不会出现完成、阻塞或退回。',
          latest: '品质岗位尚未提交检验结论。',
          receipt: null,
        },
        {
          title: '查看上周成品入库结果',
          source: '成品入库单 FG-202607-112',
          summary: '泰迪熊 35cm · 800只 · 成品仓 B-03',
          description: '该任务已由仓库完成。当前页面保留任务详情与处理回执，不能再次修改任务进度。',
          status: '已完成',
          accessLabel: '只读',
          owner: '仓库',
          severity: 'success',
          severityLabel: '已完成',
          due: '07/12 17:42',
          views: ['history'],
          actions: [],
          facts: [
            ['负责岗位', '仓库'],
            ['入库数量', '800只'],
            ['存放仓位', '成品仓 B-03'],
            ['完成时间', '07/12 17:42'],
          ],
          guidance: '任务已结束，第 2 步只解释只读原因；可直接进入第 3 步查看回执。',
          latest: '仓库已提交完成反馈并结束任务。',
          receipt: {
            status: 'confirmed',
            action: 'done',
            actionLabel: '完成',
            stateLabel: '任务已完成',
            reason: '数量和包装核对无误，已放入成品仓 B-03。',
            evidence: '现场照片：FG-112-A / 入库签收单：FG-112',
            message: '处理已确认，任务列表已同步。',
          },
        },
        {
          title: '核对多批次混装来料并确认临时隔离区、复检安排与后续转运责任',
          source: '采购入库单 PR-202607-041 / 供应商：华南纤维材料有限公司',
          summary: '短毛绒与填充棉共 7 个批次 · 标签信息较长 · 到货数量待逐批复核',
          description: '现场发现同车多批次混装，部分外箱标签被运输单覆盖。请先核对批次、数量与外观；信息不足时先标记阻塞，并写清等待事项。',
          status: '结果待确认',
          accessLabel: '可处理',
          owner: '仓库',
          severity: 'warning',
          severityLabel: '需关注',
          due: '今天 20:00',
          views: ['todo', 'risk'],
          actions: ['done', 'blocked', 'urge'],
          facts: [
            ['负责岗位', '仓库'],
            ['物料批次', '7个批次，待逐批核对'],
            ['临时区域', '待检隔离区西侧长货架'],
            ['截止时间', '今天 20:00'],
          ],
          guidance: '本岗位可以继续处理。上次提交结果尚未确认，可先查看回执，再决定刷新结果或返回处理。',
          latest: '上次提交返回结果待确认，原因与留痕已保留，可返回第 2 步重试。',
          receipt: {
            status: 'unknown',
            action: 'done',
            actionLabel: '完成',
            stateLabel: '提交结果待确认',
            reason: '已核对 7 个批次，其中 2 个批次标签被运输单覆盖，按现场记录补录；临时放置在待检隔离区西侧长货架，等待复检确认后再转运。',
            evidence: '照片：PR-041-01 至 PR-041-09 / 现场复核表：PR-041-CHECK',
            message: '网络中断前已发起提交，系统尚未确认最终结果。请刷新结果或返回处理页重试。',
          },
        },
      ];

      const state = {
        screen: 'list',
        selectedIndex: null,
        selectedAction: null,
        filter: 'todo',
        theme: 'light',
        drafts: {},
        errors: {},
        submitting: false,
        pendingFocus: '',
        lastTaskIndex: null,
        lastSync: '刚刚同步',
      };

      const app = document.querySelector('#app');
      const prototype = document.querySelector('#prototype');
      const toast = document.querySelector('#toast');
      let toastTimer = null;

      function currentTask() {
        return Number.isInteger(state.selectedIndex) ? tasks[state.selectedIndex] : null;
      }

      function draftKey(actionKey) {
        return String(state.selectedIndex) + ':' + String(actionKey || '');
      }

      function currentDraft() {
        const key = draftKey(state.selectedAction);
        if (!state.drafts[key]) {
          state.drafts[key] = { reason: '' };
        }
        return state.drafts[key];
      }

      function setPendingFocus(selector) {
        state.pendingFocus = selector || '[data-screen-heading]';
      }

      function showToast(message) {
        window.clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add('visible');
        toastTimer = window.setTimeout(function () {
          toast.classList.remove('visible');
        }, 1800);
      }

      function themeButton() {
        const dark = state.theme === 'dark';
        return '<button class="icon-button" type="button" data-theme-toggle aria-label="' +
          (dark ? '切换浅色模式' : '切换暗色模式') + '">' +
          icon(dark ? 'sun' : 'moon') +
          '</button>';
      }

      function stepNavigation(currentStep) {
        const task = currentTask();
        const definitions = [
          ['detail', '1', '查看任务', '核对信息'],
          ['process', '2', '处理任务', '选择动作'],
          ['result', '3', '结果回执', '确认结果'],
        ];
        return '<nav class="workflow-steps" aria-label="任务处理步骤">' +
          definitions
            .map(function (item) {
              const key = item[0];
              const current = key === currentStep;
              const unavailable = key === 'result' && !task?.receipt;
              return '<button class="step-button" type="button" data-step="' + key + '"' +
                (current ? ' aria-current="step"' : '') +
                (unavailable ? ' disabled aria-disabled="true"' : '') +
                ' aria-label="第 ' + item[1] + ' 步，' + item[2] + (unavailable ? '，提交后开放' : '') + '">' +
                '<span class="step-number">' + item[1] + '</span>' +
                '<span class="step-copy"><strong>' + item[2] + '</strong><small>' + item[3] + '</small></span>' +
                '</button>';
            })
            .join('') +
          '</nav>';
      }

      function flowHeader(currentStep, title) {
        return '<header class="screen-header">' +
          '<div class="topbar">' +
          '<button class="icon-button" type="button" data-back aria-label="返回">' + icon('back') + '</button>' +
          '<div class="topbar__title">' + escapeHTML(title) + '</div>' +
          themeButton() +
          '</div>' +
          stepNavigation(currentStep) +
          '</header>';
      }

      function filterTasks() {
        return tasks.filter(function (task) {
          return task.views.includes(state.filter);
        });
      }

      function severityClass(task) {
        if (task.severity === 'danger') return 'badge--danger';
        if (task.severity === 'warning') return 'badge--warning';
        if (task.severity === 'success') return 'badge--success';
        return 'badge--purple';
      }

      function dueClass(task) {
        if (task.severity === 'danger') return 'due--danger';
        if (task.severity === 'warning') return 'due--warning';
        return '';
      }

      function taskCard(task) {
        const index = tasks.indexOf(task);
        return '<button class="task-card" type="button" data-task-index="' + index + '" aria-label="打开任务：' +
          escapeHTML(task.title) + '">' +
          '<div class="task-card__top">' +
          '<span class="badge ' + severityClass(task) + '">' + escapeHTML(task.severityLabel) + '</span>' +
          '<span class="task-access">' + escapeHTML(task.accessLabel) + ' ' + icon('arrow') + '</span>' +
          '</div>' +
          '<div class="task-card__title">' + escapeHTML(task.title) + '</div>' +
          '<div class="task-card__source">' + escapeHTML(task.source) + '</div>' +
          '<div class="task-card__summary">' + escapeHTML(task.summary) + '</div>' +
          '<div class="task-card__footer">' +
          '<span>负责岗位：' + escapeHTML(task.owner) + '</span>' +
          '<span class="' + dueClass(task) + '">' + escapeHTML(task.due) + '</span>' +
          '</div>' +
          '</button>';
      }

      function renderList() {
        const visibleTasks = filterTasks();
        const overdueCount = tasks.filter(function (task) {
          return task.severity === 'danger';
        }).length;
        const attentionCount = tasks.filter(function (task) {
          return task.severity === 'warning';
        }).length;
        const filterDefinitions = [
          ['todo', '当前待办', tasks.filter(function (task) { return task.views.includes('todo'); }).length],
          ['risk', '风险关注', tasks.filter(function (task) { return task.views.includes('risk'); }).length],
          ['history', '已办回执', tasks.filter(function (task) { return task.views.includes('history'); }).length],
        ];
        const focusCopy = state.filter === 'history'
          ? '<div><strong>查看 ' + visibleTasks.length + ' 条已办回执</strong><br />终态任务只读，不再显示处理动作</div>'
          : state.filter === 'risk'
            ? '<div><strong>关注 ' + visibleTasks.length + ' 条风险任务</strong><br />先核对超时、阻塞和结果待确认事项</div>'
            : '<div><strong>先处理 ' + overdueCount + ' 条超时任务</strong><br />另有 ' +
              attentionCount + ' 条任务需要今天关注</div>';
        const cards = visibleTasks.length
          ? visibleTasks.map(taskCard).join('')
          : '<div class="empty-list"><strong>当前筛选下没有任务</strong><p class="helper">可切换其他筛选继续查看。</p></div>';

        return '<section class="screen" data-screen="list">' +
          '<header class="screen-header list-header">' +
          '<div class="header-row">' +
          '<div><p class="eyebrow">仓库岗位工作台</p><h1 tabindex="-1" data-screen-heading>任务中心</h1></div>' +
          '<div class="header-actions">' +
          '<button class="icon-button" type="button" data-refresh aria-label="刷新任务">' + icon('refresh') + '</button>' +
          themeButton() +
          '</div>' +
          '</div>' +
          '<div class="role-line"><span class="role-pill">仓库岗位</span><span class="sync-text">' + escapeHTML(state.lastSync) + ' · 当前视图 ' + visibleTasks.length + ' 条</span></div>' +
          '</header>' +
          '<main class="screen-main list-main">' +
          '<div class="focus-strip">' +
          '<span class="focus-strip__icon">' + icon('alert') + '</span>' +
          focusCopy +
          '</div>' +
          '<div class="filter-scroller" role="group" aria-label="任务筛选">' +
          filterDefinitions
            .map(function (filter) {
              return '<button class="filter-button" type="button" data-filter="' + filter[0] + '" aria-pressed="' +
                String(state.filter === filter[0]) + '">' + filter[1] + ' ' + filter[2] + '</button>';
            })
            .join('') +
          '</div>' +
          '<div class="task-list">' + cards + '</div>' +
          '</main>' +
          '</section>';
      }

      function detailGuidance(task) {
        const tone = task.actions.length === 0
          ? 'notice-card--brand'
          : task.actions.length === 1 && task.actions[0] === 'urge'
            ? 'notice-card--warning'
            : '';
        return '<div class="notice-card ' + tone + '">' + icon('info') + '<span>' + escapeHTML(task.guidance) + '</span></div>';
      }

      function renderDetail() {
        const task = currentTask();
        if (!task) return renderList();
        const facts = task.facts
          .map(function (fact) {
            return '<div class="fact"><div class="fact__label">' + escapeHTML(fact[0]) +
              '</div><div class="fact__value">' + escapeHTML(fact[1]) + '</div></div>';
          })
          .join('');
        const nextLabel = task.actions.length === 0
          ? '查看结果回执'
          : task.actions.length === 1
            ? '填写' + ACTIONS[task.actions[0]].label + '原因'
            : '选择处理方式';
        const nextStep = task.actions.length === 0 ? 'result' : 'process';

        return '<section class="screen" data-screen="detail">' +
          flowHeader('detail', '任务详情') +
          '<main class="screen-main detail-main">' +
          '<article class="hero-card">' +
          '<div class="status-row"><span class="badge ' + severityClass(task) + '">' +
          escapeHTML(task.severityLabel) + '</span><span class="task-status">' +
          escapeHTML(task.status) + '</span><span class="task-access">' +
          escapeHTML(task.accessLabel) + '</span></div>' +
          '<h1 class="hero-card__title" tabindex="-1" data-screen-heading>' + escapeHTML(task.title) + '</h1>' +
          '<p class="hero-card__description">' + escapeHTML(task.description) + '</p>' +
          '<div class="fact-grid">' + facts + '</div>' +
          '</article>' +
          detailGuidance(task) +
          '<section class="content-card">' +
          '<div class="section-heading"><h2>关联来源</h2><span class="section-heading__label">只读</span></div>' +
          '<p class="source-line"><strong>' + escapeHTML(task.source) + '</strong><br />' + escapeHTML(task.summary) + '</p>' +
          '</section>' +
          '<section class="content-card">' +
          '<div class="section-heading"><h2>任务附件</h2><span class="section-heading__label">按权限</span></div>' +
          '<p class="source-line">照片、异常截图和处理凭证统一在任务详情查看或管理，不在处理表单重复填写。</p>' +
          (task.receipt && task.receipt.evidence
            ? '<p class="activity-line"><strong>历史处理线索</strong><br />' + escapeHTML(task.receipt.evidence) + '</p>'
            : '') +
          '<button class="button button--secondary button--full" type="button" data-attachment-preview>' +
          (task.accessLabel === '可处理' ? '查看与补充附件' : '查看任务附件') + '</button>' +
          '</section>' +
          '<section class="content-card">' +
          '<div class="section-heading"><h2>最近动态</h2><span class="section-heading__label">最近一条</span></div>' +
          '<p class="activity-line"><strong>' + escapeHTML(task.status) + '</strong><br />' + escapeHTML(task.latest) + '</p>' +
          '</section>' +
          '<p class="receipt-note">完成本任务只更新任务进度；库存、出货、质检和财务结果仍需在对应业务页面办理。</p>' +
          '</main>' +
          '<footer class="screen-footer screen-footer--two">' +
          '<button class="button button--secondary" type="button" data-return-list>返回列表</button>' +
          '<button class="button button--primary" type="button" data-step="' + nextStep + '">' + nextLabel + '</button>' +
          '</footer>' +
          '</section>';
      }

      function actionChoice(actionKey) {
        const action = ACTIONS[actionKey];
        const selected = state.selectedAction === actionKey;
        return '<label class="action-choice" data-tone="' + action.tone + '" data-selected="' +
          String(selected) + '">' +
          '<input class="action-choice__radio" type="radio" name="task-action" value="' + actionKey +
          '" data-action-key="' + actionKey + '" ' + (selected ? 'checked' : '') + '>' +
          '<span class="action-choice__icon">' + icon(action.icon) + '</span>' +
          '<strong>' + escapeHTML(action.title) + '</strong>' +
          '<span>' + escapeHTML(action.description) + '</span>' +
          '</label>';
      }

      function singleActionSummary(action) {
        return '<div class="single-action-summary" data-single-action-summary>' +
          '<span class="single-action-summary__icon">' + icon(action.icon) + '</span>' +
          '<span class="single-action-summary__copy"><strong>' + escapeHTML(action.label) + '</strong>' +
          '<span>' + escapeHTML(action.description) + '</span></span>' +
          '</div>';
      }

      function formField(id, label, required, value, placeholder, error) {
        return '<div class="form-field">' +
          '<div class="form-label-row"><label class="form-label" for="' + id + '">' +
          escapeHTML(label) + (required ? ' <span class="required">*</span>' : '') +
          '</label><span class="optional">' + (required ? '必填' : '可选') + '</span></div>' +
          '<textarea id="' + id + '" maxlength="500" data-field="' + id +
          '" aria-invalid="' + String(Boolean(error)) + '" aria-describedby="' + id + '-meta" placeholder="' +
          escapeHTML(placeholder) + '">' + escapeHTML(value) + '</textarea>' +
          '<div class="field-meta" id="' + id + '-meta"><span class="' + (error ? 'field-error' : '') + '">' +
          escapeHTML(error || (required ? '提交前需要填写' : '没有内容可留空')) +
          '</span><span data-count-for="' + id + '">' + value.length + '/500</span></div>' +
          '</div>';
      }

      function quickReasons() {
        const reasons = ['材料不足', '等待上一步', '现场信息不清', '需要责任岗位确认'];
        return '<div class="quick-reasons" aria-label="快捷原因">' +
          reasons
            .map(function (reason) {
              return '<button class="quick-reason" type="button" data-quick-reason="' + escapeHTML(reason) + '">' +
                escapeHTML(reason) + '</button>';
            })
            .join('') +
          '</div>';
      }

      function renderProcess() {
        const task = currentTask();
        if (!task) return renderList();
        const hasActions = task.actions.length > 0;
        const selectedAvailable = task.actions.includes(state.selectedAction);
        if (hasActions && !selectedAvailable) {
          state.selectedAction = task.actions[0];
        }
        if (!hasActions) {
          state.selectedAction = null;
        }
        const action = state.selectedAction ? ACTIONS[state.selectedAction] : null;
        const draft = action ? currentDraft() : { reason: '' };
        const hasMultipleActions = task.actions.length > 1;
        const actionPanel = hasMultipleActions
          ? '<section class="action-card" aria-labelledby="actionPanelHeading">' +
            '<div class="action-card__heading"><h1 id="actionPanelHeading" tabindex="-1" data-screen-heading>选择处理方式</h1>' +
            '<p>' + escapeHTML(task.title) + '；请选择与现场处理情况一致的方式。</p></div>' +
            '<div class="action-grid" role="radiogroup" aria-labelledby="actionPanelHeading">' +
            task.actions.map(actionChoice).join('') + '</div></section>'
          : action
            ? '<section class="action-card" aria-labelledby="actionPanelHeading">' +
              '<div class="action-card__heading"><h1 id="actionPanelHeading" tabindex="-1" data-screen-heading>本次操作</h1>' +
              '<p>' + escapeHTML(task.title) + '；填写原因后再确认，不会代替责任岗位完成任务。</p></div>' +
              singleActionSummary(action) + '</section>'
            : '<section class="action-card" aria-labelledby="actionPanelHeading">' +
              '<div class="action-card__heading"><h1 id="actionPanelHeading" tabindex="-1" data-screen-heading>处理任务</h1></div>' +
              '<div class="notice-card notice-card--brand">' + icon('info') +
              '<span>当前任务为只读状态，不能再次提交处理。步骤仍可直接切换，您可以回到详情或查看已有回执。</span></div></section>';
        const actionForm = action
          ? '<section class="form-card" aria-label="' + escapeHTML(action.title) + '表单">' +
            formField(
              'reasonInput',
              action.reasonLabel,
              action.reasonRequired,
              draft.reason,
              action.reasonRequired ? '请说明本次' + action.label + '的原因、影响范围和需要谁协助' : '可补充本次完成说明',
              state.errors.reason
            ) +
            (action.reasonRequired ? quickReasons() : '') +
            '</section>'
          : '';
        const footer = action
          ? '<footer class="screen-footer screen-footer--two">' +
            '<button class="button button--secondary" type="button" data-step="detail" ' +
            (state.submitting ? 'disabled' : '') + '>返回详情</button>' +
            '<button class="button button--primary" type="button" data-submit ' +
            (state.submitting ? 'disabled aria-busy="true"' : '') + '>' +
            (state.submitting ? icon('spinner') + ' 确认中' : '确认' + escapeHTML(action.label)) +
            '</button></footer>'
          : '<footer class="screen-footer screen-footer--two">' +
            '<button class="button button--secondary" type="button" data-step="detail">返回详情</button>' +
            '<button class="button button--primary" type="button" data-step="result">查看回执</button>' +
            '</footer>';

        return '<section class="screen" data-screen="process">' +
          flowHeader('process', '处理任务') +
          '<main class="screen-main process-main">' +
          actionPanel +
          actionForm +
          (task.actions.includes('urge')
            ? '<p class="receipt-note">催办只会提醒责任岗位，不会代替对方完成任务。</p>'
            : '') +
          '</main>' +
          footer +
          '</section>';
      }

      function receiptRows(receipt) {
        const rows = [
          ['处理动作', receipt.actionLabel],
          ['当前结果', receipt.stateLabel],
          ['处理说明', receipt.reason || '未填写'],
        ];
        if (receipt.evidence) {
          rows.push(['历史处理线索', receipt.evidence]);
        }
        return rows
          .map(function (row) {
            return '<div class="receipt-row"><span class="receipt-row__label">' + escapeHTML(row[0]) +
              '</span><span class="receipt-row__value">' + escapeHTML(row[1]) + '</span></div>';
          })
          .join('');
      }

      function renderResult() {
        const task = currentTask();
        if (!task) return renderList();
        const receipt = task.receipt;
        if (!receipt) {
          return task.actions.length > 0 ? renderProcess() : renderDetail();
        }

        const unknown = receipt.status === 'unknown';
        const failed = receipt.status === 'failed';
        const needsConfirmation = unknown || failed;
        const footer = needsConfirmation
          ? '<footer class="screen-footer screen-footer--two">' +
            '<button class="button button--secondary" type="button" data-step="process">返回处理</button>' +
            '<button class="button button--primary" type="button" data-refresh-result>刷新结果</button>' +
            '</footer>'
          : '<footer class="screen-footer screen-footer--two">' +
            '<button class="button button--secondary" type="button" data-step="detail">查看任务</button>' +
            '<button class="button button--primary" type="button" data-return-list>返回列表</button>' +
            '</footer>';

        return '<section class="screen" data-screen="result">' +
          flowHeader('result', '结果回执') +
          '<main class="screen-main result-main">' +
          '<div class="receipt-hero">' +
          '<span class="receipt-mark ' + (needsConfirmation ? 'receipt-mark--warning' : '') + '">' +
          icon(needsConfirmation ? 'clock' : 'check') + '</span>' +
          '<h1 tabindex="-1" data-screen-heading>' +
          escapeHTML(failed ? '结果确认失败' : unknown ? '提交结果待确认' : '处理已提交') + '</h1>' +
          '<p>' + escapeHTML(receipt.message) + '</p>' +
          '<span class="receipt-status ' + (needsConfirmation ? 'receipt-status--warning' : '') + '">' +
          escapeHTML(receipt.stateLabel) + '</span>' +
          '</div>' +
          '<section class="receipt-card" aria-label="处理回执明细">' + receiptRows(receipt) + '</section>' +
          '<p class="receipt-note">此回执只表示任务处理已提交或待确认；库存、出货、质检和财务结果仍以对应业务页面为准。</p>' +
          '</main>' +
          footer +
          '</section>';
      }

      function render() {
        prototype.dataset.theme = state.theme;
        if (state.screen === 'detail') {
          app.innerHTML = renderDetail();
        } else if (state.screen === 'process') {
          app.innerHTML = renderProcess();
        } else if (state.screen === 'result') {
          app.innerHTML = renderResult();
        } else {
          app.innerHTML = renderList();
        }

        const selector = state.pendingFocus;
        state.pendingFocus = '';
        if (selector) {
          window.requestAnimationFrame(function () {
            app.querySelector(selector)?.focus({ preventScroll: true });
          });
        }
      }

      function openTask(index) {
        if (!tasks[index]) return;
        state.selectedIndex = index;
        state.lastTaskIndex = index;
        state.selectedAction = tasks[index].actions[0] || null;
        state.errors = {};
        state.screen = 'detail';
        setPendingFocus('[data-screen-heading]');
        render();
      }

      function returnToList() {
        const lastIndex = state.lastTaskIndex;
        state.screen = 'list';
        state.selectedIndex = null;
        state.selectedAction = null;
        state.errors = {};
        setPendingFocus(Number.isInteger(lastIndex) ? '[data-task-index="' + lastIndex + '"]' : '[data-screen-heading]');
        render();
      }

      function goToStep(step) {
        const task = currentTask();
        if (!task) return;
        if (!['detail', 'process', 'result'].includes(step)) return;
        if (step === 'result' && !task.receipt) {
          showToast('提交处理后才会生成结果回执');
          return;
        }
        state.errors = {};
        state.screen = step;
        setPendingFocus('[data-screen-heading]');
        render();
      }

      function handleBack() {
        if (state.submitting) return;
        if (state.screen === 'detail') {
          returnToList();
          return;
        }
        if (state.screen === 'process' || state.screen === 'result') {
          goToStep('detail');
        }
      }

      function selectAction(actionKey) {
        const task = currentTask();
        if (!task || !task.actions.includes(actionKey) || state.submitting) return;
        state.selectedAction = actionKey;
        state.errors = {};
        setPendingFocus('[data-action-key="' + actionKey + '"]');
        render();
      }

      function validateAndSubmit() {
        const task = currentTask();
        const action = ACTIONS[state.selectedAction];
        if (!task || !action || state.submitting) return;
        const draft = currentDraft();
        const errors = {};
        if (action.reasonRequired && !draft.reason.trim()) {
          errors.reason = '请先填写' + action.reasonLabel;
        }
        state.errors = errors;
        if (errors.reason) {
          setPendingFocus('#reasonInput');
          render();
          showToast('请补全必填信息');
          return;
        }

        state.submitting = true;
        render();
        window.setTimeout(function () {
          task.receipt = {
            status: 'confirmed',
            action: state.selectedAction,
            actionLabel: action.label,
            stateLabel: state.selectedAction === 'urge' ? '催办已记录' : '任务状态已更新',
            reason: draft.reason.trim(),
            message: state.selectedAction === 'urge'
              ? '催办已记录，责任岗位将收到提醒。'
              : '处理已确认，任务列表已同步。',
          };
          if (state.selectedAction === 'done') {
            task.status = '已完成';
            task.accessLabel = '只读';
            task.severity = 'success';
            task.severityLabel = '已完成';
            task.actions = [];
            task.guidance = '任务已结束，第 2 步只解释只读原因；可直接进入第 3 步查看回执。';
          } else if (state.selectedAction === 'blocked') {
            task.status = '已阻塞';
            task.severity = 'danger';
            task.severityLabel = '阻塞';
            task.actions = ['resume', 'urge'];
          } else if (state.selectedAction === 'rejected') {
            task.status = '已退回';
            task.accessLabel = '只读';
            task.actions = [];
            task.guidance = '任务已退回并结束当前处理，第 2 步只解释只读原因；可直接进入第 3 步查看回执。';
          } else if (state.selectedAction === 'resume') {
            task.status = '待处理';
            task.severity = 'warning';
            task.severityLabel = '需关注';
            task.actions = ['done', 'blocked', 'urge'];
          }
          task.latest = task.receipt.message;
          state.submitting = false;
          state.errors = {};
          state.screen = 'result';
          setPendingFocus('[data-screen-heading]');
          render();
          showToast('已生成处理回执');
        }, 700);
      }

      function refreshPendingResult() {
        const task = currentTask();
        if (!task || !task.receipt || !['unknown', 'failed'].includes(task.receipt.status)) return;
        task.receipt.status = 'confirmed';
        task.receipt.stateLabel = '处理结果已确认';
        task.receipt.message = '系统已确认上次提交，任务列表已同步。';
        task.status = '已完成';
        task.accessLabel = '只读';
        task.severity = 'success';
        task.severityLabel = '已完成';
        task.actions = [];
        task.guidance = '结果已经确认，任务当前只读；可在第 3 步查看完整回执。';
        task.latest = task.receipt.message;
        setPendingFocus('[data-screen-heading]');
        render();
        showToast('结果已确认');
      }

      app.addEventListener('click', function (event) {
        const taskButton = event.target.closest('[data-task-index]');
        if (taskButton) {
          openTask(Number(taskButton.dataset.taskIndex));
          return;
        }
        if (event.target.closest('[data-theme-toggle]')) {
          state.theme = state.theme === 'dark' ? 'light' : 'dark';
          setPendingFocus('[data-theme-toggle]');
          render();
          return;
        }
        if (event.target.closest('[data-refresh]')) {
          state.lastSync = '刚刚刷新';
          setPendingFocus('[data-refresh]');
          render();
          showToast('任务已刷新');
          return;
        }
        if (event.target.closest('[data-attachment-preview]')) {
          showToast('正式页面会按当前账号权限打开任务附件');
          return;
        }
        const filterButton = event.target.closest('[data-filter]');
        if (filterButton) {
          state.filter = filterButton.dataset.filter;
          setPendingFocus('[data-filter="' + state.filter + '"]');
          render();
          return;
        }
        if (event.target.closest('[data-back]')) {
          handleBack();
          return;
        }
        if (event.target.closest('[data-return-list]')) {
          returnToList();
          return;
        }
        const stepButton = event.target.closest('[data-step]');
        if (stepButton) {
          goToStep(stepButton.dataset.step);
          return;
        }
        const quickReason = event.target.closest('[data-quick-reason]');
        if (quickReason && state.selectedAction) {
          const draft = currentDraft();
          draft.reason = [draft.reason.trim(), quickReason.dataset.quickReason]
            .filter(Boolean)
            .join('；')
            .slice(0, 500);
          state.errors.reason = '';
          setPendingFocus('#reasonInput');
          render();
          return;
        }
        if (event.target.closest('[data-submit]')) {
          validateAndSubmit();
          return;
        }
        if (event.target.closest('[data-refresh-result]')) {
          refreshPendingResult();
        }
      });

      app.addEventListener('change', function (event) {
        if (event.target.matches('input[type="radio"][data-action-key]')) {
          selectAction(event.target.dataset.actionKey);
        }
      });

      app.addEventListener('input', function (event) {
        if (!state.selectedAction) return;
        const draft = currentDraft();
        if (event.target.id === 'reasonInput') {
          draft.reason = event.target.value;
          state.errors.reason = '';
        } else {
          return;
        }
        const counter = app.querySelector('[data-count-for="' + event.target.id + '"]');
        if (counter) counter.textContent = event.target.value.length + '/500';
        event.target.setAttribute('aria-invalid', 'false');
        const meta = app.querySelector('#' + event.target.id + '-meta span:first-child');
        if (meta && meta.classList.contains('field-error')) {
          meta.classList.remove('field-error');
          meta.textContent = '已填写，可继续提交';
        }
      });

      app.addEventListener('focusin', function (event) {
        if (event.target.matches('textarea')) {
          window.setTimeout(function () {
            event.target.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }, 120);
        }
      });

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && state.screen !== 'list') {
          event.preventDefault();
          handleBack();
          return;
        }
        if (event.altKey && ['1', '2', '3'].includes(event.key) && currentTask()) {
          event.preventDefault();
          goToStep({ '1': 'detail', '2': 'process', '3': 'result' }[event.key]);
          return;
        }
        if ((event.ctrlKey || event.metaKey) && event.key === 'Enter' && state.screen === 'process') {
          event.preventDefault();
          validateAndSubmit();
        }
      });

      function syncVisualViewport() {
        const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.documentElement.style.setProperty('--viewport-height', Math.round(height) + 'px');
      }

      window.visualViewport?.addEventListener('resize', syncVisualViewport);
      window.addEventListener('resize', syncVisualViewport);
      syncVisualViewport();
      render();
    </script>
  </body>
</html>
