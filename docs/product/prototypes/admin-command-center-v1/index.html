<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>后台工作台样板 / Admin Workbench Pattern</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f6fa;
        --surface: #ffffff;
        --surface-soft: #f7f9fc;
        --surface-blue: #edf5ff;
        --line: #dce4ef;
        --line-strong: #bdcad9;
        --text: #172033;
        --muted: #66758a;
        --primary: #1f67c9;
        --primary-strong: #1857ac;
        --primary-soft: #e8f2ff;
        --danger: #b42331;
        --danger-soft: #fff0f2;
        --warning: #9a5a00;
        --warning-soft: #fff4df;
        --success: #17704d;
        --success-soft: #eaf7f1;
        --focus: #73aaf5;
        --shadow: 0 12px 30px rgb(28 47 72 / 8%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #0f1722;
          --surface: #182334;
          --surface-soft: #202c3e;
          --surface-blue: #1d314c;
          --line: #334258;
          --line-strong: #4a5b72;
          --text: #edf3fb;
          --muted: #a8b6c8;
          --primary: #82b4ff;
          --primary-strong: #a7caff;
          --primary-soft: #1e3657;
          --danger: #ff9ca6;
          --danger-soft: #4b222b;
          --warning: #f0bd68;
          --warning-soft: #463315;
          --success: #7bd7aa;
          --success-soft: #193c2e;
          --focus: #8cbbff;
          --shadow: 0 16px 38px rgb(0 0 0 / 28%);
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: var(--bg);
      }

      body {
        min-width: 0;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button {
        font: inherit;
      }

      button:focus-visible,
      a:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--focus) 42%, transparent);
        outline-offset: 2px;
      }

      .app {
        min-height: 100vh;
      }

      .app-bar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        min-height: 60px;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--surface) 94%, transparent);
        padding: 10px 24px;
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 11px;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 9px;
        background: #245f98;
        color: #fff;
        font-weight: 760;
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-copy strong,
      .brand-copy span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .brand-copy span {
        color: var(--muted);
        font-size: 12px;
      }

      .stage {
        display: inline-flex;
        min-height: 26px;
        flex: 0 0 auto;
        align-items: center;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--muted);
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
      }

      main {
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: 24px;
      }

      .page-heading {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 16px;
      }

      .eyebrow {
        margin: 0 0 4px;
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 7px;
        font-size: clamp(24px, 2.4vw, 32px);
        line-height: 1.18;
      }

      h2 {
        margin-bottom: 0;
        font-size: 17px;
        line-height: 1.35;
      }

      h3 {
        margin-bottom: 0;
        font-size: 14px;
      }

      .lede {
        max-width: 760px;
        margin-bottom: 0;
        color: var(--muted);
      }

      .keyboard-hint {
        max-width: 330px;
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        text-align: right;
      }

      kbd {
        border: 1px solid var(--line-strong);
        border-bottom-width: 2px;
        border-radius: 5px;
        background: var(--surface);
        color: var(--text);
        padding: 1px 5px;
        font: inherit;
        font-size: 11px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(360px, 0.82fr) minmax(500px, 1.38fr);
        min-height: 670px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .master {
        display: grid;
        min-width: 0;
        grid-template-rows: auto minmax(0, 1fr);
        border-right: 1px solid var(--line);
        background: var(--surface-soft);
      }

      .master-head {
        border-bottom: 1px solid var(--line);
        background: var(--surface);
        padding: 18px;
      }

      .master-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .queue-total {
        color: var(--muted);
        font-size: 12px;
      }

      .queue-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .queue-tab {
        display: grid;
        min-width: 0;
        min-height: 68px;
        align-content: center;
        gap: 3px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 9px 10px;
        text-align: left;
        cursor: pointer;
      }

      .queue-tab:hover {
        border-color: var(--line-strong);
        background: var(--surface-blue);
      }

      .queue-tab[aria-selected="true"] {
        border-color: var(--primary);
        background: var(--primary-soft);
        color: var(--primary-strong);
        box-shadow: inset 3px 0 0 var(--primary);
      }

      .queue-tab strong {
        font-size: 20px;
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }

      .queue-tab span {
        overflow: hidden;
        font-size: 12px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-panel {
        min-height: 0;
        overflow: auto;
        padding: 10px;
      }

      .task-list {
        display: grid;
        gap: 8px;
      }

      .task-row {
        position: relative;
        display: grid;
        width: 100%;
        min-width: 0;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--surface);
        color: var(--text);
        padding: 13px 13px 13px 16px;
        text-align: left;
        cursor: pointer;
      }

      .task-row::before {
        position: absolute;
        inset: 0 auto 0 0;
        width: 3px;
        background: var(--line-strong);
        content: "";
      }

      .task-row[data-tone="danger"]::before {
        background: var(--danger);
      }

      .task-row[data-tone="warning"]::before {
        background: var(--warning);
      }

      .task-row[data-tone="primary"]::before {
        background: var(--primary);
      }

      .task-row:hover {
        border-color: var(--line-strong);
        background: var(--surface-blue);
      }

      .task-row[aria-pressed="true"] {
        border-color: var(--primary);
        background: var(--primary-soft);
        box-shadow: 0 0 0 2px
          color-mix(in srgb, var(--primary) 12%, transparent);
      }

      .task-copy {
        display: grid;
        min-width: 0;
        gap: 5px;
      }

      .task-copy strong {
        overflow: hidden;
        font-size: 14px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .task-meta {
        display: flex;
        min-width: 0;
        flex-wrap: wrap;
        gap: 4px 10px;
        color: var(--muted);
        font-size: 12px;
      }

      .task-meta span {
        overflow-wrap: anywhere;
      }

      .task-due {
        align-self: start;
        border-radius: 999px;
        background: var(--surface-soft);
        color: var(--muted);
        padding: 3px 8px;
        font-size: 12px;
        white-space: nowrap;
      }

      .task-due[data-tone="danger"] {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .task-due[data-tone="warning"] {
        background: var(--warning-soft);
        color: var(--warning);
      }

      .empty {
        display: grid;
        min-height: 220px;
        place-items: center;
        border: 1px dashed var(--line-strong);
        border-radius: 9px;
        background: var(--surface);
        color: var(--muted);
        padding: 24px;
        text-align: center;
      }

      .detail {
        min-width: 0;
        background: var(--surface);
      }

      .detail-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--line);
        padding: 22px 24px 18px;
      }

      .detail-head h2 {
        margin-top: 3px;
        font-size: 22px;
      }

      .detail-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .status {
        display: inline-flex;
        min-height: 26px;
        flex: 0 0 auto;
        align-items: center;
        border-radius: 999px;
        background: var(--primary-soft);
        color: var(--primary-strong);
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .status[data-tone="danger"] {
        background: var(--danger-soft);
        color: var(--danger);
      }

      .status[data-tone="warning"] {
        background: var(--warning-soft);
        color: var(--warning);
      }

      .status[data-tone="success"] {
        background: var(--success-soft);
        color: var(--success);
      }

      .detail-body {
        display: grid;
        gap: 20px;
        padding: 22px 24px 28px;
      }

      .priority-note {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 12px;
        align-items: start;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--surface-blue);
        padding: 14px;
      }

      .note-icon {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border-radius: 8px;
        background: var(--primary-soft);
        color: var(--primary-strong);
        font-weight: 800;
      }

      .priority-note p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .section-block {
        display: grid;
        gap: 10px;
      }

      .section-heading {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }

      .section-heading span {
        color: var(--muted);
        font-size: 12px;
      }

      .context-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 9px;
        background: var(--surface-soft);
      }

      .context-grid div {
        min-width: 0;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
      }

      .context-grid div:nth-child(2n) {
        border-right: 0;
      }

      .context-grid div:nth-last-child(-n + 2) {
        border-bottom: 0;
      }

      dt {
        color: var(--muted);
        font-size: 12px;
      }

      dd {
        margin: 4px 0 0;
        overflow-wrap: anywhere;
        font-weight: 650;
      }

      .record-list {
        display: grid;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 9px;
      }

      .record-row {
        display: grid;
        grid-template-columns: 110px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid var(--line);
        padding: 11px 13px;
      }

      .record-row:last-child {
        border-bottom: 0;
      }

      .record-kind,
      .record-note {
        color: var(--muted);
        font-size: 12px;
      }

      .record-value {
        min-width: 0;
        overflow-wrap: anywhere;
        font-weight: 650;
      }

      .processing-hint {
        border-left: 3px solid var(--primary);
        background: var(--surface-soft);
        padding: 12px 14px;
      }

      .processing-hint p {
        margin: 4px 0 0;
        color: var(--muted);
      }

      .boundary {
        margin: 0;
        border-top: 1px solid var(--line);
        color: var(--muted);
        padding-top: 14px;
        font-size: 12px;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        clip-path: inset(50%);
      }

      @media (max-width: 980px) {
        .workspace {
          grid-template-columns: 1fr;
        }

        .master {
          max-height: 560px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }

      @media (max-width: 660px) {
        .app-bar {
          position: static;
          align-items: flex-start;
          padding: 12px 14px;
        }

        main {
          padding: 16px 12px 24px;
        }

        .page-heading {
          display: block;
        }

        .keyboard-hint {
          margin-top: 10px;
          text-align: left;
        }

        .workspace {
          min-height: 0;
        }

        .master-head,
        .detail-head,
        .detail-body {
          padding-right: 14px;
          padding-left: 14px;
        }

        .queue-tabs {
          grid-template-columns: 1fr;
        }

        .queue-tab {
          min-height: 52px;
          grid-template-columns: auto minmax(0, 1fr);
          align-items: center;
          gap: 10px;
        }

        .task-row {
          grid-template-columns: 1fr;
        }

        .task-due {
          justify-self: start;
        }

        .detail-head {
          display: grid;
        }

        .status {
          justify-self: start;
        }

        .context-grid {
          grid-template-columns: 1fr;
        }

        .context-grid div,
        .context-grid div:nth-child(2n),
        .context-grid div:nth-last-child(-n + 2) {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .context-grid div:last-child {
          border-bottom: 0;
        }

        .record-row {
          grid-template-columns: 1fr;
          gap: 3px;
        }

        .record-note {
          justify-self: start;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="app-bar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">工</div>
          <div class="brand-copy">
            <strong>工作台</strong>
            <span>今日待办与当前任务</span>
          </div>
        </div>
        <span class="stage">To Implement · 原型样板</span>
      </header>

      <main>
        <div class="page-heading">
          <div>
            <p class="eyebrow">TODAY / 先判断，再处理</p>
            <h1>今天先处理什么</h1>
            <p class="lede">
              按紧急程度聚合当前账号需要关注的协同任务；选择左侧任务后，在右侧核对影响、责任和关联记录。
            </p>
          </div>
          <p class="keyboard-hint">
            键盘：<kbd>←</kbd><kbd>→</kbd> 切换队列，
            <kbd>↑</kbd><kbd>↓</kbd> 切换当前任务
          </p>
        </div>

        <section class="workspace" aria-label="优先队列与当前任务">
          <aside class="master" aria-labelledby="queue-heading">
            <div class="master-head">
              <div class="master-title">
                <h2 id="queue-heading">优先队列</h2>
                <span class="queue-total" id="queueTotal"></span>
              </div>
              <div class="queue-tabs" role="tablist" aria-label="任务队列">
                <button
                  class="queue-tab"
                  id="queue-mine"
                  type="button"
                  role="tab"
                  data-filter="mine"
                  aria-controls="taskPanel"
                  aria-selected="true"
                >
                  <strong id="count-mine">0</strong>
                  <span>待我处理</span>
                </button>
                <button
                  class="queue-tab"
                  id="queue-risk"
                  type="button"
                  role="tab"
                  data-filter="risk"
                  aria-controls="taskPanel"
                  aria-selected="false"
                  tabindex="-1"
                >
                  <strong id="count-risk">0</strong>
                  <span>阻塞 / 逾期</span>
                </button>
                <button
                  class="queue-tab"
                  id="queue-waiting"
                  type="button"
                  role="tab"
                  data-filter="waiting"
                  aria-controls="taskPanel"
                  aria-selected="false"
                  tabindex="-1"
                >
                  <strong id="count-waiting">0</strong>
                  <span>等待交接</span>
                </button>
              </div>
            </div>
            <div
              class="task-panel"
              id="taskPanel"
              role="tabpanel"
              aria-labelledby="queue-mine"
            >
              <div class="task-list" id="taskList" aria-label="当前队列任务"></div>
            </div>
          </aside>

          <article class="detail" aria-labelledby="detailTitle">
            <header class="detail-head">
              <div>
                <p class="eyebrow">CURRENT TASK / 当前任务</p>
                <h2 id="detailTitle"></h2>
                <p class="detail-subtitle" id="detailSubtitle"></p>
              </div>
              <span class="status" id="detailStatus"></span>
            </header>

            <div class="detail-body">
              <section class="priority-note" aria-labelledby="impactTitle">
                <span class="note-icon" aria-hidden="true">!</span>
                <div>
                  <h3 id="impactTitle">为什么现在处理</h3>
                  <p id="detailImpact"></p>
                </div>
              </section>

              <section class="section-block" aria-labelledby="contextTitle">
                <div class="section-heading">
                  <h3 id="contextTitle">处理上下文</h3>
                  <span>只读核对</span>
                </div>
                <dl class="context-grid">
                  <div>
                    <dt>责任岗位</dt>
                    <dd id="detailRole"></dd>
                  </div>
                  <div>
                    <dt>到期时间</dt>
                    <dd id="detailDue"></dd>
                  </div>
                  <div>
                    <dt>任务来源</dt>
                    <dd id="detailSource"></dd>
                  </div>
                  <div>
                    <dt>处理入口</dt>
                    <dd id="detailEntry"></dd>
                  </div>
                </dl>
              </section>

              <section class="section-block" aria-labelledby="recordsTitle">
                <div class="section-heading">
                  <h3 id="recordsTitle">关联记录</h3>
                  <span>随当前任务变化</span>
                </div>
                <div class="record-list" id="recordList"></div>
              </section>

              <section class="processing-hint" aria-labelledby="processingHintTitle">
                <h3 id="processingHintTitle">处理提示</h3>
                <p id="detailProcessingHint"></p>
              </section>

              <p class="boundary" id="detailBoundary"></p>
            </div>
          </article>
        </section>
        <p class="sr-only" id="selectionAnnouncement" aria-live="polite"></p>
      </main>
    </div>

    <script>
      const tasks = [
        {
          id: "quality-review",
          filter: "mine",
          title: "确认来料质检结论",
          subtitle: "来料质检 · QI-240716-018",
          status: "待我处理",
          tone: "primary",
          due: "今天 14:30",
          role: "品质",
          source: "采购入库",
          entry: "来料质检",
          impact: "本批物料尚未形成可用于后续入库判断的检验结论，采购与仓库都在等待处理结果。",
          processingHint: "进入来料质检页面核对抽检结果，并按真实检验结果提交结论。",
          boundary: "完成协同任务只表示责任已处理；库存是否入账仍以采购入库记录为准。",
          records: [
            ["采购入库单", "PR-240716-006", "待检"],
            ["供应商", "华东辅料供应商", "已启用"],
            ["物料", "填充棉 · 300kg", "本批"],
          ],
        },
        {
          id: "delivery-confirm",
          filter: "mine",
          title: "确认销售订单交期",
          subtitle: "销售订单 · SO-240715-012",
          status: "待我处理",
          tone: "primary",
          due: "今天 16:00",
          role: "业务",
          source: "销售订单",
          entry: "销售订单",
          impact: "客户承诺日期尚未确认，采购与生产排程无法使用稳定的交期依据。",
          processingHint: "进入销售订单页面核对客户要求、数量和承诺日期。",
          boundary: "确认订单交期不会自动生成生产、库存预留、出货或财务记录。",
          records: [
            ["销售订单", "SO-240715-012", "待确认"],
            ["客户", "国内渠道客户", "正常"],

        {

        {
          id: "reason-handoff",
          filter: "waiting",
          title: "等待品质补充返工原因",

          status: "等待交接",
          tone: "warning",
          due: "今天",
          role: "生产",
          source: "生产异常",
          entry: "生产异常",
          impact: "返工原因尚未补齐，生产负责人无法判断后续安排和责任交接。",

          records: [
            ["生产记录", "PRD-240715-027", "异常"],
            ["质量检验", "QI-240715-011", "待补原因"],
            ["产品", "坐姿公仔 · 160 件", "本批"],
          ],
        },
        {
          id: "finance-handoff",
          filter: "waiting",
          title: "等待采购确认对账差异",
          subtitle: "对账记录 · RC-240715-008",
          status: "等待交接",
          tone: "warning",
          due: "明天",
          role: "财务",
          source: "对账记录",
          entry: "对账管理",
          impact: "数量差异尚未由采购核实，财务不能继续确认本次对账结果。",
          processingHint: "等待采购岗位确认来源记录；确认后回到对账页面继续核对。",
          boundary: "对账协同完成不等于付款完成，也不会自动生成付款记录。",
          records: [
            ["对账记录", "RC-240715-008", "有差异"],
            ["采购入库", "PR-240710-019", "已办理"],
            ["供应商", "包装材料供应商", "正常"],
          ],
        },
      ];

      const filterLabels = {
        mine: "待我处理",
        risk: "阻塞 / 逾期",
        waiting: "等待交接",
      };

      let activeFilter = "mine";
      const selectedByFilter = {
        mine: "quality-review",
        risk: "inbound-blocked",
        waiting: "reason-handoff",
      };

      const tabs = Array.from(document.querySelectorAll(".queue-tab"));
      const taskList = document.querySelector("#taskList");
      const taskPanel = document.querySelector("#taskPanel");
      const announcement = document.querySelector("#selectionAnnouncement");

      function setText(selector, value) {
        const element = document.querySelector(selector);
        if (element) element.textContent = value;
      }

      function tasksForActiveFilter() {
        return tasks.filter(function (task) {
          return task.filter === activeFilter;
        });
      }

      function selectedTask() {
        const fallback = tasksForActiveFilter()[0] || tasks[0];
        return (
          tasks.find(function (task) {
            return task.id === selectedByFilter[activeFilter];
          }) || fallback
        );
      }

      function updateCounts() {
        Object.keys(filterLabels).forEach(function (filter) {
          const count = tasks.filter(function (task) {
            return task.filter === filter;
          }).length;
          setText("#count-" + filter, String(count));
        });
      }

      function renderRecords(task) {
        const list = document.querySelector("#recordList");
        list.replaceChildren();
        task.records.forEach(function (record) {
          const row = document.createElement("div");
          row.className = "record-row";

          const kind = document.createElement("span");
          kind.className = "record-kind";
          kind.textContent = record[0];

          const value = document.createElement("span");
          value.className = "record-value";
          value.textContent = record[1];

          const note = document.createElement("span");
          note.className = "record-note";
          note.textContent = record[2];

          row.append(kind, value, note);
          list.appendChild(row);
        });
      }

      function updateDetail(task, shouldAnnounce) {
        setText("#detailTitle", task.title);
        setText("#detailSubtitle", task.subtitle);
        setText("#detailStatus", task.status);
        setText("#detailImpact", task.impact);
        setText("#detailRole", task.role);
        setText("#detailDue", task.due);
        setText("#detailSource", task.source);
        setText("#detailEntry", task.entry);
        setText("#detailProcessingHint", task.processingHint);
        setText("#detailBoundary", task.boundary);

        const status = document.querySelector("#detailStatus");
        status.dataset.tone = task.tone;
        renderRecords(task);

        if (shouldAnnounce) {
          announcement.textContent = "已选择任务：" + task.title;
        }
      }

      function selectTask(task, shouldFocus, shouldAnnounce) {
        selectedByFilter[activeFilter] = task.id;
        renderTasks();
        updateDetail(task, shouldAnnounce);
        if (shouldFocus) {
          const selectedButton = taskList.querySelector(
            '[data-task-id="' + task.id + '"]'
          );
          if (selectedButton) selectedButton.focus();
        }
      }

      function handleTaskKeydown(event, task) {
        if (!["ArrowDown", "ArrowUp", "Home", "End"].includes(event.key)) {
          return;
        }
        event.preventDefault();
        const visible = tasksForActiveFilter();
        const index = visible.findIndex(function (item) {
          return item.id === task.id;
        });
        let nextIndex = index;
        if (event.key === "ArrowDown") nextIndex = (index + 1) % visible.length;
        if (event.key === "ArrowUp") {
          nextIndex = (index - 1 + visible.length) % visible.length;
        }
        if (event.key === "Home") nextIndex = 0;
        if (event.key === "End") nextIndex = visible.length - 1;
        selectTask(visible[nextIndex], true, true);
      }

      function renderTasks() {
        const visible = tasksForActiveFilter();
        taskList.replaceChildren();
        setText(
          "#queueTotal",
          filterLabels[activeFilter] + " · " + visible.length + " 项"
        );

        if (!visible.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "当前队列没有需要显示的任务";
          taskList.appendChild(empty);
          return;
        }

        visible.forEach(function (task) {
          const button = document.createElement("button");
          button.className = "task-row";
          button.type = "button";
          button.dataset.taskId = task.id;
          button.dataset.tone = task.tone;
          button.setAttribute(
            "aria-pressed",
            String(selectedByFilter[activeFilter] === task.id)
          );

          const copy = document.createElement("span");
          copy.className = "task-copy";
          const title = document.createElement("strong");
          title.textContent = task.title;
          const meta = document.createElement("span");
          meta.className = "task-meta";
          const source = document.createElement("span");
          source.textContent = task.subtitle;
          const role = document.createElement("span");
          role.textContent = "责任：" + task.role;
          meta.append(source, role);
          copy.append(title, meta);

          const due = document.createElement("span");
          due.className = "task-due";
          due.dataset.tone = task.tone;
          due.textContent = task.due;

          button.append(copy, due);
          button.addEventListener("click", function () {
            selectTask(task, true, true);
          });
          button.addEventListener("keydown", function (event) {
            handleTaskKeydown(event, task);
          });
          taskList.appendChild(button);
        });
      }

      function activateFilter(tab, shouldFocus) {
        activeFilter = tab.dataset.filter;
        tabs.forEach(function (item) {
          const active = item === tab;
          item.setAttribute("aria-selected", String(active));
          item.tabIndex = active ? 0 : -1;
        });
        taskPanel.setAttribute("aria-labelledby", tab.id);
        const task = selectedTask();
        renderTasks();
        updateDetail(task, true);
        if (shouldFocus) tab.focus();
      }

      function handleTabKeydown(event, tab) {
        if (!["ArrowRight", "ArrowLeft", "Home", "End"].includes(event.key)) {
          return;
        }
        event.preventDefault();
        const currentIndex = tabs.indexOf(tab);
        let nextIndex = currentIndex;
        if (event.key === "ArrowRight") {
          nextIndex = (currentIndex + 1) % tabs.length;
        }
        if (event.key === "ArrowLeft") {
          nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
        }
        if (event.key === "Home") nextIndex = 0;
        if (event.key === "End") nextIndex = tabs.length - 1;
        activateFilter(tabs[nextIndex], true);
      }

      tabs.forEach(function (tab) {
        tab.addEventListener("click", function () {
          activateFilter(tab, false);
        });
        tab.addEventListener("keydown", function (event) {
          handleTabKeydown(event, tab);
        });
      });

      updateCounts();
      renderTasks();
      updateDetail(selectedTask(), false);
    </script>
  </body>
