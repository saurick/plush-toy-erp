<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>业务模块标准页样板</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef4ef;
        --panel: #ffffff;
        --panel-soft: #f8fbf8;
        --line: #dbe7df;
        --line-strong: #c9d8cf;
        --text: #172033;
        --muted: #68778b;
        --green: #188545;
        --green-strong: #14733b;
        --green-soft: #edf8f1;
        --red: #d8484f;
        --red-soft: #fff1f2;
        --amber: #b66a09;
        --amber-soft: #fff7e8;
        --disabled: #b8c0c9;
        --shadow: 0 8px 24px rgb(15 23 42 / 8%);
        --overlay: rgb(15 23 42 / 42%);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: dark;
          --bg: #101827;
          --panel: #182235;
          --panel-soft: #202c42;
          --line: #334157;
          --line-strong: #46566f;
          --text: #edf3fb;
          --muted: #aab7ca;
          --green: #7dd8ad;
          --green-strong: #5fc991;
          --green-soft: #193b2b;
          --red: #ff9aa2;
          --red-soft: #4a2228;
          --amber: #f0bd67;
          --amber-soft: #463214;
          --disabled: #6c7686;
          --shadow: 0 18px 44px rgb(0 0 0 / 28%);
          --overlay: rgb(0 0 0 / 58%);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
      }

      .app {
        min-height: 100vh;
        padding: 8px;
      }

      .page {
        display: grid;
        gap: 8px;
        min-width: 0;
      }

      .panel {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgb(255 255 255 / 94%);
        box-shadow: var(--shadow);
      }

      .header {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 12px 16px;
      }

      .eyebrow {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 2px;
        font-size: 24px;
        line-height: 1.2;
      }

      .summary {
        max-width: 900px;
        margin-top: 5px;
        color: var(--muted);
        font-size: 14px;
      }

      .stats,
      .toolbar-row,
      .toolbar-actions,
      .create-actions,
      .selection-actions,
      .pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .stats {
        justify-content: flex-end;
      }

      .stat {
        display: grid;
        min-width: 112px;
        min-height: 50px;
        align-content: center;
        gap: 2px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-soft);
        padding: 7px 10px;
      }

      .stat span,
      .muted {
        color: var(--muted);
      }

      .stat strong {
        color: var(--text);
        font-size: 20px;
        line-height: 1.1;
      }

      .workbench {
        display: grid;
        gap: 12px;
        overflow: visible;
        padding: 14px 16px 12px;
      }

      .workbench-filters {
        display: grid;
        grid-template-columns: minmax(280px, 1.7fr) minmax(132px, 0.75fr) repeat(2, minmax(150px, 0.8fr)) minmax(180px, 1fr) minmax(170px, 1fr);
        gap: 10px;
      }

      .search,
      .select,
      .date-input {
        min-height: 42px;
        border: 1px solid var(--line-strong);
        border-radius: 12px;
        background: #fff;
        color: var(--text);
      }

      .search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
      }

      .search span {
        color: #435064;
        font-size: 18px;
      }

      input {
        width: 100%;
        min-width: 0;
        border: 0;
        background: transparent;
        color: var(--text);
        outline: 0;
      }

      .select,
      .date-input {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 14px;
        color: var(--muted);
        font-size: 15px;
        font-weight: 700;
      }

      .toolbar-row {
        justify-content: space-between;
        gap: 14px;
      }

      .toolbar-actions {
        flex: 1 1 520px;
        justify-content: flex-start;
      }

      .create-actions {
        flex: 0 0 auto;
        justify-content: flex-end;
      }

      .pill {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-soft);
        padding: 0 10px;
        white-space: nowrap;
      }

      .pill strong {
        color: var(--text);
        font-size: 16px;
      }

      .btn {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        background: #fff;
        color: #263344;
        font-weight: 700;
        padding: 0 14px;
      }

      .btn.primary {
        border-color: var(--green);
        background: var(--green);
        color: #fff;
        box-shadow: 0 2px 4px rgb(20 115 59 / 24%);
      }

      .btn.small {
        min-height: 30px;
        padding: 0 10px;
        font-size: 13px;
      }

      .btn.link {
        border-color: transparent;
        background: transparent;
        color: var(--muted);
      }

      .btn.danger {
        border-color: #ff6b72;
        color: #b4232c;
      }

      .btn:disabled {
        border-color: #d8dde3;
        background: #f5f6f7;
        color: var(--disabled);
      }

      .status-action-menu {
        position: relative;
        display: inline-flex;
      }

      .status-action-popover {
        position: absolute;
        z-index: 6;
        top: calc(100% + 6px);
        right: 0;
        display: grid;
        min-width: 132px;
        gap: 3px;
        border: 1px solid var(--line-strong);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: var(--shadow);
        padding: 6px;
      }

      .status-action-popover strong {
        padding: 2px 8px 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .status-action-popover button {
        justify-content: flex-start;
        min-height: 30px;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--text);
        padding: 0 8px;
        text-align: left;
      }

      .status-action-popover button.danger {
        color: var(--red);
      }

      .selection-row:not(.has-selection) .status-action-popover {
        display: none;
      }

      .selection-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        border-top: 1px dashed var(--line);
        min-height: 48px;
        padding-top: 10px;
      }

      .selection-copy {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        min-width: 0;
        gap: 8px;
        overflow: hidden;
      }

      .selection-title {
        font-size: 14px;
        font-weight: 800;
      }

      .selection-summary {
        overflow: hidden;
        min-width: 0;
        max-width: 100%;
        color: #2f3b4e;
        font-weight: 700;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .selection-summary.empty {
        color: var(--muted);
        font-weight: 650;
      }

      .selection-summary:not(.empty) {
        display: inline-flex;
        min-height: 30px;
        align-items: center;
        border: 1px solid #9be27a;
        border-radius: 999px;
        background: #efffe8;
        color: var(--green);
        padding: 0 12px;
        font-weight: 800;
      }

      .selection-actions {
        justify-content: flex-end;
        max-width: 900px;
      }

      .table-panel {
        padding: 0;
      }

      .table-wrap {
        overflow: auto;
      }

      table {
        width: 100%;
        min-width: 980px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        vertical-align: middle;
      }

      th {
        background: #f8fafc;
        color: #4c5f76;
        font-size: 12px;
        font-weight: 800;
      }

      .th-inner {
        display: grid;
        min-width: 0;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 8px;
      }

      .th-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .column-menu {
        display: inline-grid;
        width: 24px;
        height: 28px;
        place-items: center;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: #6b7c93;
        font-size: 18px;
        line-height: 1;
      }

      .sort-stack {
        display: inline-grid;
        width: 22px;
        height: 28px;
        align-content: center;
        justify-items: center;
        gap: 3px;
        color: #b7bec8;
      }

      .sort-stack::before,
      .sort-stack::after {
        display: block;
        width: 0;
        height: 0;
        content: "";
        border-right: 6px solid transparent;
        border-left: 6px solid transparent;
      }

      .sort-stack::before {
        border-bottom: 8px solid currentcolor;
      }

      .sort-stack::after {
        border-top: 8px solid currentcolor;
      }

      td {
        overflow: hidden;
        color: #243044;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      tr {
        cursor: pointer;
      }

      tr.selected td {
        background: var(--green-soft);
      }

      .status {
        display: inline-flex;
        min-height: 24px;
        align-items: center;
        border-radius: 999px;
        padding: 0 9px;
        font-size: 12px;
        font-weight: 800;
      }

      .status.green {
        background: var(--green-soft);
        color: var(--green-strong);
      }

      .status.amber {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .status.red {
        background: var(--red-soft);
        color: var(--red);
      }

      .pager {
        display: flex;
        justify-content: flex-end;
        padding: 12px 18px;
      }

      .pagination {
        gap: 18px;
        font-size: 21px;
        color: #111827;
      }

      .page-button {
        display: inline-flex;
        width: 56px;
        height: 48px;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--green);
        border-radius: 18px;
        color: var(--green);
        font-weight: 800;
      }

      .page-size {
        display: inline-flex;
        min-width: 150px;
        height: 48px;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 2px solid #d8dbe0;
        border-radius: 18px;
        background: #fff;
      }

      .pager-arrow {
        color: #b8c0c9;
        font-size: 30px;
        line-height: 1;
      }

      .modal-layer {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        background: var(--overlay);
        padding: 24px;
      }

      body.show-recycle .modal-layer {
        display: flex;
      }

      .recycle-modal {
        display: grid;
        width: min(980px, calc(100vw - 48px));
        max-height: calc(100vh - 64px);
        grid-template-rows: auto auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 18px 48px rgb(15 23 42 / 18%);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 22px 10px;
      }

      .modal-title {
        font-size: 20px;
        font-weight: 850;
      }

      .modal-close {
        width: 34px;
        height: 34px;
        border: 0;
        background: transparent;
        color: var(--muted);
        font-size: 34px;
        line-height: 1;
      }

      .modal-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        padding: 0 22px 12px;
      }

      .modal-body {
        overflow: auto;
        padding: 0 22px 22px;
      }

      .recycle-modal table {
        min-width: 860px;
      }

      .empty-recycle {
        display: grid;
        min-height: 220px;
        place-items: center;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 16px;
        font-weight: 750;
      }

      @media (prefers-color-scheme: dark) {
        .panel,
        .search,
        .select,
        .date-input,
        .btn,
        .page-size,
        th {
          background: var(--panel);
          color: var(--text);
        }

        .column-menu {
          color: var(--muted);
        }

        .sort-stack {
          color: #6f7e91;
        }

        td {
          color: var(--text);
        }

        .selection-summary {
          color: var(--text);
        }

        .selection-summary.empty {
          color: var(--muted);
        }
      }

      @media (max-width: 980px) {
        .header,
        .toolbar-row,
        .selection-row {
          grid-template-columns: 1fr;
        }

        .toolbar-row {
          display: grid;
        }

        .selection-row {
          gap: 6px;
        }

        .selection-copy {
          flex-wrap: nowrap;
          gap: 6px;
        }

        .selection-title {
          flex: 0 0 auto;
        }

        .selection-summary {
          flex: 1 1 auto;
        }

        .stats,
        .toolbar-actions,
        .create-actions,
        .selection-actions {
          justify-content: flex-start;
        }

        .selection-actions {
          flex-wrap: nowrap;
          max-width: 100%;
          overflow-x: auto;
          padding-bottom: 2px;
        }

        .workbench-filters {
          grid-template-columns: 1fr;
        }

        .modal-layer {
          padding: 12px;
        }

        .recycle-modal {
          width: 100%;
          max-height: calc(100vh - 24px);
        }
      }

      @media (max-width: 640px) {
        .app {
          padding: 8px;
        }

        h1 {
          font-size: 22px;
        }

        .stat {
          min-width: 104px;
        }

        .workbench-filters {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .workbench-filters .search {
          grid-column: 1 / -1;
        }

        .pagination {
          width: 100%;
          justify-content: space-between;
          gap: 10px;
          font-size: 18px;
        }

        .page-button {
          width: 56px;
          height: 48px;
        }

        .page-size {
          min-width: 124px;
          height: 48px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="page" aria-label="业务模块标准页样板">
        <section class="panel">
          <div class="header">
            <div>
              <div class="eyebrow">采购/仓储</div>
              <h1>采购订单</h1>
              <p class="summary">
                采购订单页承接供应商、材料、数量、单价和预计到货信息；辅料、包材等先作为材料主数据维护，再进入采购订单明细。
              </p>
            </div>
            <div class="stats" aria-label="页面摘要">
              <div class="stat"><span>当前结果</span><strong>3</strong></div>
              <div class="stat"><span>金额合计</span><strong>4,500</strong></div>
            </div>
          </div>
        </section>

        <section class="panel workbench" aria-label="筛选与当前操作">
          <div class="workbench-filters">
            <label class="search">
              <span aria-hidden="true">⌕</span>
              <input value="" placeholder="搜编号/名称/客户/合同" />
            </label>
            <div class="select">
              <span>签约日期</span>
              <span aria-hidden="true">⌄</span>
            </div>
            <div class="date-input">
              <span>yyyy/mm/dd</span>
              <span aria-hidden="true">▣</span>
            </div>
            <div class="date-input">
              <span>yyyy/mm/dd</span>
              <span aria-hidden="true">▣</span>
            </div>
            <div class="select">
              <span>按状态箱筛选</span>
              <span aria-hidden="true">⌄</span>
            </div>
            <div class="select">
              <span>最新优先</span>
              <span aria-hidden="true">⌄</span>
            </div>
          </div>
          <div class="toolbar-row">
            <div class="toolbar-actions">
              <button class="btn">导出当前结果</button>
              <button class="btn">⚙ 列顺序</button>
              <button class="btn danger">♲ 批量删除</button>
              <button class="btn" id="openRecycle" type="button">回收站</button>
            </div>
            <div class="create-actions">
              <button class="btn primary">+ 新建记录</button>
            </div>
          </div>
          <div class="selection-row" id="selectionBar">
            <div class="selection-copy">
              <span class="selection-title">当前操作</span>
              <span class="selection-summary empty" id="selectedSummary">
                请选择一条记录
              </span>
            </div>
            <div class="selection-actions">
              <button class="btn link small" id="clearSelection">清空已选</button>
              <button class="btn small action-button">编辑</button>
              <button class="btn small action-button">关联表格 ⌄</button>
              <div class="status-action-menu" aria-label="更多操作下拉示意">
                <button class="btn small action-button" type="button">更多操作 ⌄</button>
                <div class="status-action-popover" role="menu" aria-label="状态变更">
                  <strong>状态变更</strong>
                  <button type="button" role="menuitem">关闭</button>
                  <button class="danger" type="button" role="menuitem">取消</button>
                </div>
              </div>
              <button class="btn small action-button">复制</button>
              <button class="btn small primary action-button">生成入库通知</button>
              <button class="btn small action-button">打印采购合同</button>
              <button class="btn small danger action-button">删除</button>
            </div>
          </div>
        </section>

        <section class="panel table-panel" aria-label="业务记录表">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width: 52px">选中</th>
                  <th style="width: 150px">
                    <span class="th-inner">
                      <span class="th-title">采购编号</span>
                      <button class="column-menu" type="button" aria-label="调整采购编号列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按采购编号排序"></span>
                    </span>
                  </th>
                  <th>
                    <span class="th-inner">
                      <span class="th-title">材料品名</span>
                      <button class="column-menu" type="button" aria-label="调整材料品名列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按材料品名排序"></span>
                    </span>
                  </th>
                  <th style="width: 130px">
                    <span class="th-inner">
                      <span class="th-title">规格</span>
                      <button class="column-menu" type="button" aria-label="调整规格列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按规格排序"></span>
                    </span>
                  </th>
                  <th style="width: 110px">
                    <span class="th-inner">
                      <span class="th-title">数量</span>
                      <button class="column-menu" type="button" aria-label="调整数量列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按数量排序"></span>
                    </span>
                  </th>
                  <th style="width: 120px">
                    <span class="th-inner">
                      <span class="th-title">单价</span>
                      <button class="column-menu" type="button" aria-label="调整单价列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按单价排序"></span>
                    </span>
                  </th>
                  <th style="width: 130px">
                    <span class="th-inner">
                      <span class="th-title">回货日期</span>
                      <button class="column-menu" type="button" aria-label="调整回货日期列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按回货日期排序"></span>
                    </span>
                  </th>
                  <th style="width: 120px">
                    <span class="th-inner">
                      <span class="th-title">状态</span>
                      <button class="column-menu" type="button" aria-label="调整状态列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按状态排序"></span>
                    </span>
                  </th>
                  <th style="width: 150px">
                    <span class="th-inner">
                      <span class="th-title">当前任务</span>
                      <button class="column-menu" type="button" aria-label="调整当前任务列顺序">⋮</button>
                      <span class="sort-stack" aria-label="按当前任务排序"></span>
                    </span>
                  </th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
          <div class="pager">
            <div class="pagination" aria-label="分页">
              <strong>共 3 条</strong>
              <span class="pager-arrow" aria-hidden="true">‹</span>
              <span class="page-button">1</span>
              <span class="pager-arrow" aria-hidden="true">›</span>
              <span class="page-size">8 条/页 <span aria-hidden="true">⌄</span></span>
            </div>
          </div>
        </section>
      </div>
    </main>

    <div class="modal-layer" role="presentation">
      <section class="recycle-modal" role="dialog" aria-modal="true" aria-labelledby="recycleTitle">
        <header class="modal-head">
          <h2 class="modal-title" id="recycleTitle">回收站</h2>
          <button class="modal-close" id="closeRecycle" type="button" aria-label="关闭">×</button>
        </header>
        <div class="modal-toolbar">
          <button class="btn" disabled type="button">↩ 批量恢复</button>
          <span class="muted">已选择 0 条回收站记录</span>
        </div>
        <div class="modal-body">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width: 52px">选中</th>
                  <th style="width: 150px">单据编号</th>
                  <th>标题</th>
                  <th style="width: 150px">业务状态</th>
                  <th style="width: 160px">删除时间</th>
                  <th style="width: 150px">删除原因</th>
                  <th style="width: 150px">操作</th>
                </tr>
              </thead>
            </table>
          </div>
          <div class="empty-recycle">回收站暂无记录</div>
        </div>
      </section>
    </div>

    <script>
      const records = [
        {
          no: "KSC260404001",
          name: "双层防潮袋",
          spec: "680 x 920",
          qty: "1,200",
          price: "1.80",
          date: "2026-06-18",
          status: "跟催中",
          statusTone: "amber",
          task: "供应商确认",
        },
        {
          no: "KSC260404002",
          name: "五层外箱",
          spec: "60 x 45 x 38",
          qty: "600",
          price: "4.20",
          date: "2026-06-20",
          status: "待回货",
          statusTone: "green",
          task: "回货跟进",
        },
        {
          no: "KSC260404003",
          name: "吊牌棉绳",
          spec: "本白 2mm",
          qty: "3,000",
          price: "0.32",
          date: "2026-06-22",
          status: "阻塞",
          statusTone: "red",
          task: "单价复核",
        },
      ];

      const rows = document.querySelector("#rows");
      const selectionBar = document.querySelector("#selectionBar");
      const selectedSummary = document.querySelector("#selectedSummary");
      const clearSelection = document.querySelector("#clearSelection");
      const actionButtons = document.querySelectorAll(".action-button");
      const openRecycle = document.querySelector("#openRecycle");
      const closeRecycle = document.querySelector("#closeRecycle");
      let selectedIndex = 0;

      function renderRows() {
        rows.innerHTML = "";
        records.forEach((record, index) => {
          const tr = document.createElement("tr");
          const selected = index === selectedIndex;
          tr.className = selected ? "selected" : "";
          tr.innerHTML = `
            <td><input type="checkbox" ${selected ? "checked" : ""} aria-label="选择 ${record.no}" /></td>
            <td>${record.no}</td>
            <td>${record.name}</td>
            <td>${record.spec}</td>
            <td>${record.qty}</td>
            <td>${record.price}</td>
            <td>${record.date}</td>
            <td><span class="status ${record.statusTone}">${record.status}</span></td>
            <td>${record.task}</td>
          `;
          tr.addEventListener("click", () => {
            selectedIndex = index;
            renderRows();
            syncSelection();
          });
          rows.appendChild(tr);
        });
      }

      function syncSelection() {
        const hasSelection = selectedIndex >= 0;
        selectionBar.classList.toggle("has-selection", hasSelection);
        selectedSummary.classList.toggle("empty", !hasSelection);
        actionButtons.forEach((button) => {
          button.disabled = !hasSelection;
        });
        clearSelection.disabled = !hasSelection;

        if (!hasSelection) {
          selectedSummary.textContent = "请选择一条记录";
          return;
        }

        const record = records[selectedIndex];
        selectedSummary.textContent = record.no;
      }

      clearSelection.addEventListener("click", () => {
        selectedIndex = -1;
        renderRows();
        syncSelection();
      });

      openRecycle.addEventListener("click", () => {
        document.body.classList.add("show-recycle");
      });

      closeRecycle.addEventListener("click", () => {
        document.body.classList.remove("show-recycle");
      });

      renderRows();
      syncSelection();
    </script>
  </body>
</html>
