# 本地联调私有覆盖示例：复制为 config.local.yaml 后填写真实值，禁止把真实密码提交进仓库。
trace:
  jaeger:
    endpoint: 192.168.0.106:4318

data:
  postgres:
    # 若你在 DB 客户端里使用的是 zos_test_user 等其他共享账号，请把用户名和密码改成你的实际联调账号。
    dsn: "postgres://test_user:change-this-shared-postgres-password@192.168.0.106:5432/plush_erp?sslmode=disable"
  auth:
    jwtSecret: "replace-with-local-dev-jwt-secret"
    admin:
      username: "admin"
      password: "replace-with-local-admin-password"
