# server/configs/prod/config.yaml
server:
  http:
    addr: 0.0.0.0:8300
    timeout: 45s
  grpc:
    addr: 0.0.0.0:9300
    timeout: 10s

log:
  debug: false

# 链路追踪服务器
trace:
  jaeger:
    traceName: ""
    # 线上宿主机进程默认连同机 Jaeger 的本地 OTLP HTTP 端口。
    endpoint: 127.0.0.1:4318
    # endpoint: http://127.0.0.1:4318/v1/traces
    # gRPC endpoint
    # endpoint: http://127.0.0.1:4317
    # 生产默认低采样；排障时可通过 TRACE_RATIO 临时调高，ratio>=1 表示采集所有。
    ratio: 0.1

# 数据相关
data:
  # 主数据库，保存核心数据
  postgres:
    # if true output sql
    debug: false
    # 生产环境密码由 compose 注入 POSTGRES_DSN 覆盖，仓库内仅保留脱敏占位值。
    dsn: "postgres://postgres:change-this-prod-postgres-password@postgres:5432/plush_erp?sslmode=disable"

  # 缓存服务
  # redis:
  #   network: tcp
  #   address: 127.0.0.1:6379
  #   password: ""
  #   database: 0
  #   readTimeout: 0.2s
  #   writeTimeout: 0.2s
  etcd:
    hosts:
      - etcd:2379
  # 认证相关
  auth:
    jwtSecret: "change-this-prod-jwt-secret"
    jwtExpireSeconds: 604800 # 7 days
    sms:
      mode: "disabled"
    admin:
      username: "admin"
      # 留空表示不自动创建 bootstrap admin；新库首次初始化时通过 APP_ADMIN_PASSWORD 临时注入。
      password: ""
