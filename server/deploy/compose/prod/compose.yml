name: plush-toy-erp-prod

services:
  postgres:
    image: postgres:18
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-prod-postgres-password}"
      POSTGRES_DB: "${POSTGRES_DB:-plush_toy_erp}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/plush-toy-erp/postgres}:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  app-server:
    image: "${APP_IMAGE:-plush-toy-erp-server:dev}"
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-server"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-8200}:8000"
      - "${APP_GRPC_PORT:-9200}:9000"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      # 设计意图：默认 DSN 必须与本项目 prod 配置保持一致，避免 .env 未显式覆盖时误连占位库名或占位密码。
      POSTGRES_DSN: "${POSTGRES_DSN:-postgres://postgres:change-this-prod-postgres-password@postgres:5432/plush_toy_erp?sslmode=disable}"
      TRACE_ENDPOINT: "${TRACE_ENDPOINT:-}"
    mem_limit: "${APP_MEM_LIMIT:-160m}"
    mem_reservation: "${APP_MEM_RESERVATION:-80m}"
    networks: {}
