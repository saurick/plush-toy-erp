name: plush-toy-erp-prod

x-web-app-common: &web-app-common
  image: "${WEB_IMAGE:-plush-toy-erp-web:dev}"
  restart: always
  depends_on:
    app-server:
      condition: service_started
  environment: &web-app-environment
    TZ: "${TZ:-Asia/Shanghai}"
    API_ORIGIN: "${WEB_API_ORIGIN:-http://app-server:8200}"
    PROXY_PREFIXES: "${WEB_PROXY_PREFIXES:-/rpc,/templates}"
    PROXY_TIMEOUT_MS: "${WEB_PROXY_TIMEOUT_MS:-30000}"
  mem_limit: "${WEB_MEM_LIMIT:-96m}"
  mem_reservation: "${WEB_MEM_RESERVATION:-48m}"
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '5175') + '/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
      ]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 10s
  networks: {}

services:
  postgres:
    image: postgres:18
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-prod-postgres-password}"
      POSTGRES_DB: "${POSTGRES_DB:-plush_erp}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/plush-toy-erp/postgres}:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-jaeger"
    restart: always
    ports:
      - "${JAEGER_5775_PORT:-15775}:5775/udp"
      - "${JAEGER_6831_PORT:-16831}:6831/udp"
      - "${JAEGER_6832_PORT:-16832}:6832/udp"
      - "${JAEGER_5778_PORT:-15778}:5778"
      - "${JAEGER_UI_PORT:-16687}:16686"
      - "${JAEGER_14268_PORT:-24268}:14268"
      - "${JAEGER_14250_PORT:-24250}:14250"
      - "${JAEGER_9411_PORT:-19411}:9411"
      - "${JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${JAEGER_OTLP_HTTP_PORT:-14318}:4318"
    environment:
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: true
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: "${PROMETHEUS_SERVER_URL:-http://host.docker.internal:3004}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: "${JAEGER_MEM_LIMIT:-96m}"
    mem_reservation: "${JAEGER_MEM_RESERVATION:-48m}"
    networks: {}

  app-server:
    image: "${APP_IMAGE:-plush-toy-erp-server:dev}"
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-server"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${APP_HTTP_PORT:-8200}:8200"
      - "${APP_GRPC_PORT:-9200}:9200"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      # 设计意图：默认 DSN 必须与本项目 prod 配置保持一致，避免 .env 未显式覆盖时误连占位库名或占位密码。
      POSTGRES_DSN: "${POSTGRES_DSN:-postgres://postgres:change-this-prod-postgres-password@postgres:5432/plush_erp?sslmode=disable}"
      TRACE_ENDPOINT: "${TRACE_ENDPOINT:-jaeger:4318}"
    mem_limit: "${APP_MEM_LIMIT:-160m}"
    mem_reservation: "${APP_MEM_RESERVATION:-80m}"
    networks: {}

  web-desktop:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-desktop"
    ports:
      - "${WEB_DESKTOP_PORT:-5175}:5175"
    environment:
      <<: *web-app-environment
      APP_ID: desktop
      PORT: "5175"

  web-mobile-boss:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-boss"
    ports:
      - "${WEB_MOBILE_BOSS_PORT:-5186}:5186"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-boss
      PORT: "5186"

  web-mobile-merchandiser:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-merchandiser"
    ports:
      - "${WEB_MOBILE_MERCHANDISER_PORT:-5187}:5187"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-merchandiser
      PORT: "5187"

  web-mobile-purchasing:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-purchasing"
    ports:
      - "${WEB_MOBILE_PURCHASING_PORT:-5188}:5188"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-purchasing
      PORT: "5188"

  web-mobile-production:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-production"
    ports:
      - "${WEB_MOBILE_PRODUCTION_PORT:-5189}:5189"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-production
      PORT: "5189"

  web-mobile-warehouse:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-warehouse"
    ports:
      - "${WEB_MOBILE_WAREHOUSE_PORT:-5190}:5190"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-warehouse
      PORT: "5190"

  web-mobile-finance:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-finance"
    ports:
      - "${WEB_MOBILE_FINANCE_PORT:-5191}:5191"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-finance
      PORT: "5191"

  web-mobile-pmc:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-pmc"
    ports:
      - "${WEB_MOBILE_PMC_PORT:-5192}:5192"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-pmc
      PORT: "5192"

  web-mobile-quality:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-mobile-quality"
    ports:
      - "${WEB_MOBILE_QUALITY_PORT:-5193}:5193"
    environment:
      <<: *web-app-environment
      APP_ID: mobile-quality
      PORT: "5193"
