name: plush-toy-erp-prod

x-web-app-common: &web-app-common
  image: "${WEB_IMAGE:-plush-toy-erp-web:dev}"
  restart: always
  depends_on:
    app-server:
      condition: service_started
  environment: &web-app-environment
    TZ: "${TZ:-Asia/Shanghai}"
    API_ORIGIN: "${WEB_API_ORIGIN:-http://app-server:8300}"
    PROXY_PREFIXES: "${WEB_PROXY_PREFIXES:-/rpc,/templates}"
    PROXY_TIMEOUT_MS: "${WEB_PROXY_TIMEOUT_MS:-30000}"
  mem_limit: "${WEB_MEM_LIMIT:-96m}"
  mem_reservation: "${WEB_MEM_RESERVATION:-48m}"
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || '5175') + '/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
      ]
    interval: 5s
    timeout: 3s
    retries: 20
    start_period: 10s
  networks: {}

services:
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:18.1}"
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-postgres"
    restart: always
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5435}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-prod-postgres-password}"
      POSTGRES_DB: "${POSTGRES_DB:-plush_erp}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/plush-toy-erp/postgres}:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  jaeger:
    image: "${JAEGER_IMAGE:-jaegertracing/all-in-one:1.76.0}"
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-jaeger"
    restart: always
    ports:
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_5775_PORT:-15775}:5775/udp"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_6831_PORT:-16831}:6831/udp"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_6832_PORT:-16832}:6832/udp"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_5778_PORT:-15778}:5778"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_UI_PORT:-16687}:16686"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_14268_PORT:-24268}:14268"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_14250_PORT:-24250}:14250"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_9411_PORT:-19411}:9411"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_OTLP_GRPC_PORT:-14317}:4317"
      - "${JAEGER_BIND_ADDR:-127.0.0.1}:${JAEGER_OTLP_HTTP_PORT:-14318}:4318"
    environment:
      PROMETHEUS_QUERY_SUPPORT_SPANMETRICS_CONNECTOR: true
      METRICS_STORAGE_TYPE: prometheus
      PROMETHEUS_SERVER_URL: "${PROMETHEUS_SERVER_URL:-http://host.docker.internal:3004}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: "${JAEGER_MEM_LIMIT:-96m}"
    mem_reservation: "${JAEGER_MEM_RESERVATION:-48m}"
    networks: {}

  app-server:
    image: "${APP_IMAGE:-plush-toy-erp-server:dev}"
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-server"
    restart: always
    # Chromium 保持 sandbox；仅在 Moby 默认 seccomp v0.2.3 基础上放行
    # user-namespace 所需的 clone / clone3 / unshare，不授予额外 capability。
    security_opt:
      - "seccomp=./chromium-seccomp.json"
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "${APP_HTTP_BIND_ADDR:-127.0.0.1}:${APP_HTTP_PORT:-8300}:8300"
      - "${APP_GRPC_BIND_ADDR:-127.0.0.1}:${APP_GRPC_PORT:-9300}:9300"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      ERP_CUSTOMER_KEY: "${ERP_CUSTOMER_KEY:-demo}"
      ERP_PDF_CHROME_PATH: "${ERP_PDF_CHROME_PATH:-/usr/bin/chromium}"
      ERP_PDF_RENDER_CONCURRENCY: "${ERP_PDF_RENDER_CONCURRENCY:-4}"
      ERP_PDF_WARMUP: "${ERP_PDF_WARMUP:-}"
      # 设计意图：默认 DSN 必须与本项目 prod 配置保持一致，避免 .env 未显式覆盖时误连占位库名或占位密码。
      POSTGRES_DSN: "${POSTGRES_DSN:-postgres://postgres:change-this-prod-postgres-password@postgres:5432/plush_erp?sslmode=disable}"
      TRACE_ENDPOINT: "${TRACE_ENDPOINT:-jaeger:4318}"
      TRACE_RATIO: "${TRACE_RATIO:-0.1}"
      APP_JWT_SECRET: "${APP_JWT_SECRET:-change-this-prod-jwt-secret}"
      APP_AUTH_SMS_MODE: "${APP_AUTH_SMS_MODE:-disabled}"
      APP_AUTH_SMS_ALIYUN_ACCESS_KEY_ID: "${APP_AUTH_SMS_ALIYUN_ACCESS_KEY_ID:-}"
      APP_AUTH_SMS_ALIYUN_ACCESS_KEY_SECRET: "${APP_AUTH_SMS_ALIYUN_ACCESS_KEY_SECRET:-}"
      APP_AUTH_SMS_ALIYUN_SIGN_NAME: "${APP_AUTH_SMS_ALIYUN_SIGN_NAME:-}"
      APP_AUTH_SMS_ALIYUN_TEMPLATE_CODE: "${APP_AUTH_SMS_ALIYUN_TEMPLATE_CODE:-}"
      APP_AUTH_SMS_ALIYUN_TEMPLATE_PARAM: "${APP_AUTH_SMS_ALIYUN_TEMPLATE_PARAM:-}"
      APP_AUTH_SMS_ALIYUN_SCHEME_NAME: "${APP_AUTH_SMS_ALIYUN_SCHEME_NAME:-}"
      APP_ADMIN_USERNAME: "${APP_ADMIN_USERNAME:-admin}"
      BOOTSTRAP_ADMIN_ONCE: "${BOOTSTRAP_ADMIN_ONCE:-false}"
      # 默认不注入 APP_ADMIN_PASSWORD。新库首次初始化时必须同时临时设置 BOOTSTRAP_ADMIN_ONCE=true；
      # 成功后服务会写入 marker，再次 bootstrap 会被拒绝，避免长期 secret 或自动提权。
      ERP_DEBUG_ENV: "${ERP_DEBUG_ENV:-prod}"
      ERP_DEBUG_SEED_ENABLED: "${ERP_DEBUG_SEED_ENABLED:-false}"
      ERP_DEBUG_CLEANUP_ENABLED: "${ERP_DEBUG_CLEANUP_ENABLED:-false}"
      ERP_DEBUG_BUSINESS_CLEAR_ENABLED: "${ERP_DEBUG_BUSINESS_CLEAR_ENABLED:-false}"
      ERP_DEBUG_CLEANUP_SCOPE: "${ERP_DEBUG_CLEANUP_SCOPE:-debug_run}"
      # 仅 customer-trial-133 的隔离验收库可显式开启；正式部署保持 0 + 空 target。
      ERP_ALLOW_CUSTOMER_TRIAL_CONFIG: "${ERP_ALLOW_CUSTOMER_TRIAL_CONFIG:-0}"
      ERP_CUSTOMER_TRIAL_TARGET: "${ERP_CUSTOMER_TRIAL_TARGET:-}"
    mem_limit: "${APP_MEM_LIMIT:-2g}"
    mem_reservation: "${APP_MEM_RESERVATION:-768m}"
    networks: {}

  web-desktop:
    <<: *web-app-common
    container_name: "${PROJECT_SLUG:-plush-toy-erp}-web-desktop"
    ports:
      - "${WEB_DESKTOP_BIND_ADDR:-0.0.0.0}:${WEB_DESKTOP_PORT:-5175}:5175"
    environment:
      <<: *web-app-environment
      APP_ID: desktop
      PORT: "5175"
